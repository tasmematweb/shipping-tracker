<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع شحنات J&T Express</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .logo { text-align: center; margin-bottom: 20px; font-size: 40px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .loading { text-align: center; padding: 20px; display: none; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result { display: none; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .timeline {
            position: relative;
            padding-right: 30px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-right: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            right: -34px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #667eea;
        }
        .time { color: #666; font-size: 14px; margin-bottom: 5px; }
        .event { font-weight: bold; color: #333; margin-bottom: 5px; }
        .location { color: #666; font-size: 14px; }
        .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; text-align: center; display: none; }
        .problem { color: #c62828; font-size: 14px; margin-top: 5px; }
        .pics { margin-top: 10px; }
        .pics img { max-width: 200px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .active { display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <h1>تتبع شحنات J&T Express</h1>
        
        <div class="search-box">
            <input type="text" id="billCode" placeholder="أدخل رقم الشحنة" dir="ltr">
            <button onclick="trackShipment()">🔍 تتبع</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري البحث عن الشحنة...</p>
        </div>
        
        <div class="error" id="error"></div>
        <div class="result" id="result"></div>
    </div>

    <!-- مكتبة MD5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

    <script>
        const API_ACCOUNT = "866958120939696147";
        const PRIVATE_KEY = "29535fad70ca4688aaa5b462320eb096";
        const API_URL = "https://openapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace";

        // استخدام CORS Proxy مجاني
        const PROXY_URL = "https://api.allorigins.win/raw?url=";

        async function trackShipment() {
            const billCode = document.getElementById('billCode').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            
            error.classList.remove('active');
            result.classList.remove('active');
            result.innerHTML = '';
            
            if (!billCode) {
                error.textContent = 'الرجاء إدخال رقم الشحنة';
                error.classList.add('active');
                return;
            }
            
            loading.classList.add('active');
            
            try {
                const timestamp = Date.now().toString();
                const bizContent = JSON.stringify({ billCodes: billCode });
                
                // حساب MD5 باستخدام المكتبة
                const rawString = bizContent + PRIVATE_KEY;
                const md5Hex = md5(rawString);
                
                // تحويل hex إلى base64
                const md5Bytes = new Uint8Array(md5Hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                let binary = '';
                md5Bytes.forEach(byte => binary += String.fromCharCode(byte));
                const digest = btoa(binary);

                // تجهيز body
                const formBody = new URLSearchParams();
                formBody.append('bizContent', bizContent);

                // إرسال الطلب عبر proxy لتجاوز CORS
                const response = await fetch(PROXY_URL + encodeURIComponent(API_URL), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'apiAccount': API_ACCOUNT,
                        'timestamp': timestamp,
                        'digest': digest
                    },
                    body: formBody.toString()
                });

                const data = await response.json();
                
                loading.classList.remove('active');
                
                if (data.code === '1' || data.code === 1) {
                    if (data.data && data.data.length > 0) {
                        displayResult(data.data[0]);
                    } else {
                        error.textContent = 'لم يتم العثور على بيانات الشحنة';
                        error.classList.add('active');
                    }
                } else {
                    error.textContent = data.msg || 'فشل في جلب البيانات';
                    error.classList.add('active');
                }
                
            } catch (e) {
                loading.classList.remove('active');
                error.textContent = 'حدث خطأ: ' + e.message;
                error.classList.add('active');
            }
        }
        
        function displayResult(shipment) {
            const result = document.getElementById('result');
            result.classList.add('active');
            
            let html = `<div class="status">📋 رقم الشحنة: ${shipment.billCode}</div>`;
            
            if (shipment.details && shipment.details.length > 0) {
                html += '<div class="timeline">';
                
                shipment.details.forEach(detail => {
                    html += `
                        <div class="timeline-item">
                            <div class="time">🕐 ${detail.scanTime || ''}</div>
                            <div class="event">📍 ${detail.desc || detail.scanType || ''}</div>
                            <div class="location">🏢 ${detail.scanNetworkName || ''} - ${detail.scanNetworkCity || ''} - ${detail.scanNetworkProvince || ''}</div>
                    `;
                    
                    if (detail.probleDescription) {
                        html += `<div class="problem">⚠️ ${detail.probleDescription}</div>`;
                    }
                    
                    if (detail.problemPicUrl) {
                        const pics = detail.problemPicUrl.split(',');
                        html += '<div class="pics">';
                        pics.forEach(pic => {
                            html += `<img src="${pic.trim()}" alt="صورة" onclick="window.open(this.src)">`;
                        });
                        html += '</div>';
                    }
                    
                    html += '</div>';
                });
                
                html += '</div>';
            }
            
            result.innerHTML = html;
        }
        
        document.getElementById('billCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') trackShipment();
        });
    </script>
</body>
</html>
