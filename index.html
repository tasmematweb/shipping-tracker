<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع شحنات J&T Express</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #e60012; margin-bottom: 25px; }
        .logo { text-align: center; font-size: 50px; margin-bottom: 15px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            direction: ltr;
        }
        button {
            padding: 12px 25px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #cc0000; }
        .loading { text-align: center; padding: 20px; display: none; }
        .result { display: none; }
        .error { background: #ffe6e6; color: #cc0000; padding: 12px; border-radius: 8px; display: none; margin-bottom: 15px; }
        .status {
            padding: 12px;
            background: #e6ffe6;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #006600;
            text-align: center;
        }
        .timeline-item {
            border-right: 3px solid #e60012;
            padding: 12px 15px;
            margin-right: 10px;
            margin-bottom: 15px;
            background: #fafafa;
            border-radius: 0 8px 8px 0;
        }
        .time { color: #999; font-size: 13px; }
        .event { font-weight: bold; color: #333; margin: 5px 0; }
        .location { color: #666; font-size: 14px; }
        .problem { color: #e60012; font-size: 13px; margin-top: 5px; }
        .active { display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <h1>تتبع شحنات J&T Express مصر</h1>
        
        <div class="search-box">
            <input type="text" id="billCode" placeholder="أدخل رقم الشحنة">
            <button onclick="trackShipment()">تتبع 🔍</button>
        </div>
        
        <div class="loading" id="loading">⏳ جاري البحث...</div>
        <div class="error" id="error"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw37rQZCBjTIkEw70ZEJn7p_CggvhLEs2V_ChPaZ-IY0YCeKxXPHBX_2F6MpixK7sU/exec";

        async function trackShipment() {
            const billCode = document.getElementById('billCode').value.trim();
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            
            errorDiv.classList.remove('active');
            resultDiv.classList.remove('active');
            resultDiv.innerHTML = '';
            
            if (!billCode) {
                errorDiv.textContent = '⚠️ الرجاء إدخال رقم الشحنة';
                errorDiv.classList.add('active');
                return;
            }
            
            loading.classList.add('active');
            
            try {
                const response = await fetch(SCRIPT_URL + "?billCode=" + encodeURIComponent(billCode));
                const data = await response.json();
                
                loading.classList.remove('active');
                
                if (data.code === "1" && data.data && data.data.length > 0) {
                    displayResult(data.data[0]);
                } else {
                    errorDiv.textContent = '❌ لم يتم العثور على الشحنة';
                    errorDiv.classList.add('active');
                }
            } catch (e) {
                loading.classList.remove('active');
                errorDiv.textContent = '❌ فشل الاتصال. حاول مرة أخرى.';
                errorDiv.classList.add('active');
            }
        }
        
        function displayResult(shipment) {
            const resultDiv = document.getElementById('result');
            resultDiv.classList.add('active');
            
            let html = `<div class="status">📋 رقم الشحنة: ${shipment.billCode}</div>`;
            
            if (shipment.details) {
                shipment.details.forEach(d => {
                    html += `
                        <div class="timeline-item">
                            <div class="time">🕐 ${d.scanTime || ''}</div>
                            <div class="event">📌 ${d.desc || d.scanType || ''}</div>
                            <div class="location">📍 ${d.scanNetworkName || ''} - ${d.scanNetworkCity || ''}</div>
                            ${d.probleDescription ? `<div class="problem">⚠️ ${d.probleDescription}</div>` : ''}
                        </div>
                    `;
                });
            }
            
            resultDiv.innerHTML = html;
        }

        document.getElementById('billCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') trackShipment();
        });
    </script>
</body>
</html>
