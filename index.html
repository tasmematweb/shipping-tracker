<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تتبع وإدارة شحنات J&T</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 10px;
            direction: rtl;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            min-height: 95vh;
            position: relative;
        }
        .hidden {
            display: none !important;
        }
        .login-page {
            padding: 40px 25px 30px;
            text-align: center;
            background: white;
        }
        .login-page .logo {
            font-size: 72px;
            margin-bottom: 8px;
            display: block;
        }
        .login-page .brand {
            color: #e60012;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .login-page .sub-brand {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .login-page .input-group {
            margin-bottom: 16px;
            text-align: right;
        }
        .login-page .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .login-page .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
            transition: border 0.2s;
            text-align: right;
        }
        .login-page .input-group input:focus {
            border-color: #e60012;
            outline: none;
            background: white;
        }
        .login-page .login-btn {
            width: 100%;
            padding: 16px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .login-page .login-btn:active {
            background: #cc0010;
        }
        .login-page .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 14px;
            padding: 8px;
            background: #ffeaea;
            border-radius: 8px;
        }
        .app-header {
            background: #e60012;
            padding: 16px 20px 14px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .app-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header .user-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
        .app-header .user-info .name {
            font-size: 15px;
            font-weight: 600;
        }
        .app-header .user-info .role {
            font-size: 11px;
            opacity: 0.8;
        }
        .app-header .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .app-header .header-actions button {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .app-header .header-actions button:active {
            background: rgba(255, 255, 255, 0.35);
        }
        .app-header .header-actions button.green {
            background: #28a745;
        }
        .app-header .header-actions button.blue {
            background: #0066cc;
        }
        .app-header .header-actions button.orange {
            background: #ff9800;
        }
        .app-header .header-actions button.outline {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
        }
        .summary-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 12px 14px;
            background: #f8f8f8;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #eee;
        }
        .summary-box .stat {
            text-align: center;
            background: white;
            padding: 8px 4px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }
        .summary-box .stat .count {
            font-size: 22px;
            font-weight: 700;
            color: #e60012;
        }
        .summary-box .stat .label {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        .content-area {
            padding: 12px 14px 20px;
        }
        .loading {
            text-align: center;
            padding: 40px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e60012;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .shipment-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
        }
        .shipment-card .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .status-waiting {
            background: #fff3cd;
            color: #856404;
        }
        .status-tracking {
            background: #d1ecf1;
            color: #0c5460;
        }
        .status-done {
            background: #d4edda;
            color: #155724;
        }
        .shipment-card .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            color: #555;
            border-bottom: 1px dashed #f0f0f0;
        }
        .shipment-card .row:last-child {
            border-bottom: none;
        }
        .shipment-card .row .label {
            color: #999;
            font-weight: 400;
        }
        .shipment-card .row .value {
            font-weight: 500;
            color: #222;
            text-align: left;
            direction: ltr;
        }
        .shipment-card .row .value.ar {
            direction: rtl;
            text-align: right;
        }
        .shipment-card .card-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shipment-card .card-actions button {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            min-width: 80px;
        }
        .btn-track {
            background: #0066cc;
            color: white;
        }
        .btn-add-tracking {
            background: #28a745;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 16px;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px 20px;
            position: relative;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-box .close-btn {
            position: absolute;
            top: 14px;
            left: 16px;
            font-size: 26px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }
        .modal-box .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 18px;
            padding-left: 30px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            background: #fafafa;
            transition: border 0.2s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #e60012;
            outline: none;
            background: white;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .modal-box .submit-btn {
            width: 100%;
            padding: 14px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }
        .modal-box .submit-btn.green {
            background: #28a745;
        }
        .modal-box .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 10px;
            padding: 8px;
            background: #ffeaea;
            border-radius: 8px;
            text-align: center;
        }
        .error-box {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            color: #d32f2f;
        }
        .error-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        .error-box .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .error-box .sub {
            font-size: 13px;
            color: #666;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 99999;
            animation: toastIn 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .two-columns .form-group {
            margin-bottom: 10px;
        }
        @media (max-width: 400px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- صفحة تسجيل الدخول -->
        <div id="loginPage" class="login-page">
            <span class="logo">📦</span>
            <div class="brand">نظام تتبع شحنات J&T</div>
            <div class="sub-brand">إدارة الشحنات بكل سهولة</div>
            <div class="input-group">
                <label>📱 رقم الهاتف</label>
                <input type="text" id="loginPhone" placeholder="أدخل رقم الهاتف" dir="ltr">
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" dir="ltr">
            </div>
            <button class="login-btn" onclick="doLogin()">🚀 دخول</button>
            <div id="loginError" class="error-msg hidden"></div>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboard" class="hidden">
            <div class="app-header">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div>
                        <div class="name" id="userName">مرحباً</div>
                        <div class="role" id="userRole">عميل</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="addShipmentBtn" class="green hidden" onclick="showAddShipmentForm()">➕ إضافة</button>
                    <button id="clientsBtn" class="blue hidden" onclick="showClients()">👥 عملاء</button>
                    <button id="allShipmentsBtn" class="orange hidden" onclick="loadAllShipments()">📋 الكل</button>
                    <button class="outline" onclick="logout()">🚪 خروج</button>
                </div>
            </div>
            <div id="summaryBox" class="summary-box hidden">
                <div class="stat"><div class="count" id="totalCount">0</div><div class="label">كل الشحنات</div></div>
                <div class="stat"><div class="count" id="waitingCount" style="color:#856404;">0</div><div class="label">قيد الانتظار</div></div>
                <div class="stat"><div class="count" id="trackingCount" style="color:#0c5460;">0</div><div class="label">قيد التتبع</div></div>
                <div class="stat"><div class="count" id="doneCount" style="color:#155724;">0</div><div class="label">تم التوصيل</div></div>
            </div>
            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <!-- مودال -->
    <div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this) closeModal()">
        <div class="modal-box" id="modalBox">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  🔗 الرابط الجديد
        // ============================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxg_LV0JV1zOaktiPvsUVOLFjPGkWTbOcZkqIX7b_o3FzzriLkQzSmb2rLvklNS6kDN/exec";
        let currentUser = null;
        let currentShipments = [];

        // ============================================================
        //  قائمة المحافظات والمدن (من الشيت)
        // ============================================================
        const governorates = {
            'الشرقية': ['بلبيس', 'انشاص الرمل', 'أولاد صقر', 'الحسينية', 'ديرب نجم', 'فاقوس', 'كفر صقر', 'مشتول السوق', 'منيا القمح', 'الصالحية القديمة', 'الصالحية الجديدة', 'صان الحجر', 'مدينة العاشر من رمضان'],
            'الجيزة': ['مدينة السادس من أكتوبر', 'مدينة الشيخ زايد', 'العياط', 'الحوامدية', 'البدرشين', 'الصف', 'العمرانية', 'أطفيح', 'الواحات البحرية', 'الجيزة', 'حدائق الاهرام', 'فيصل', 'الهرم', 'أبو النمرس', 'العجوزة', 'الوراق', 'أوسيم', 'بولاق الدكرور', 'الدقي', 'أرض اللواء', 'المهندسين', 'كرداسة', 'إمبابة', 'منشأة القناطر'],
            'الغربية': ['كفر الزيات', 'المحلة الكبرى', 'سمنود', 'بسيون', 'السنطة', 'زفتى', 'قطور', 'طنطا'],
            'الدقهلية': ['المنصورة', 'أجا', 'المنزلة', 'بلقاس', 'دكرنس', 'السنبلاوين', 'منية النصر', 'ميت غمر', 'شربين', 'طلخا'],
            'الإسكندرية': ['الدخيلة', 'العامرية', 'برج العرب', 'محرم بيك', 'باب شرقي', 'الساحل الشمالي', 'سيدي جابر', 'العطارين', 'المنشية', 'اللبان', 'الجمرك', 'مينا البصل', 'كرموز', 'الرمل', 'المنتزه'],
            'أسيوط': ['أبنوب', 'أبوتيج', 'البداري', 'الغنايم', 'الفتح', 'القوصية', 'ديروط', 'ساحل سليم', 'صدفا', 'مدينة أسيوط', 'منفلوط', 'منقباد'],
            'أسوان': ['أسوان', 'كوم امبو', 'دراو', 'إدفو'],
            'بني سويف': ['الواسطى', 'ناصر', 'مدينة بني سويف', 'مركز بني سويف', 'أهناسيا', 'ببا', 'سمسطا', 'الفشن'],
            'القليوبية': ['بنها', 'الخانكة', 'العبور', 'القناطر الخيرية', 'شبين القناطر', 'طوخ', 'كفر شكر', 'قليوب', 'شبرا الخيمة'],
            'القاهرة': ['عابدين', 'العباسية', 'الأزبكية', 'القطامية', 'المنيل', 'المقطم', 'دار السلام', 'البساتين', 'الجمالية', 'السيدة زينب', 'حلوان', 'المعادي', 'مصر القديمة', 'قصر النيل', 'الخليفة', 'طرة', 'الزمالك', 'الشروق', 'مدينة بدر', 'عين شمس', 'مدينتي', 'الزيتون', 'مدينة نصر', 'القاهرة الجديدة', 'هليوبوليس', 'الأميرية', 'السلام', 'الوايلي', 'الشرابية', 'المرج', 'المطرية', 'النزهة', 'حدائق القبة', 'شبرا مصر', 'كورنيش النيل'],
            'البحيرة': ['دمنهور', 'كفر الدوار', 'أبو حمص', 'المحمودية', 'وادي النطرون', 'النوبارية', 'أبوالمطامير', 'حوش عيسي', 'إيتاي البارود', 'شبراخيت', 'رشيد', 'إدكوا', 'مركز بدر', 'الدلنجات', 'الرحمانية', 'كوم حمادة'],
            'دمياط': ['فارسكور', 'دمياط القديمة', 'كفر سعد', 'الزرقا', 'كفر البطيخ', 'دمياط الجديدة', 'رأس البر', 'عزبة البرج'],
            'الفيوم': ['طامية', 'سنورس', 'مركز الفيوم', 'مدينة الفيوم', 'أطسا', 'أبشواي', 'يوسف الصديق'],
            'البحر الأحمر': ['الغردقة', 'رأس غارب', 'سفاجا', 'القصير', 'مرسى علم'],
            'الإسماعيلية': ['الإسماعيلية'],
            'كفر الشيخ': ['كفر الشيخ', 'دسوق', 'فوه', 'مطوبس', 'بلطيم', 'الحامول', 'الرياض', 'بيلا', 'قلين', 'سيدى سالم'],
            'الأقصر': ['مدينة الأقصر', 'أرمنت', 'أسنا', 'القرنة'],
            'مرسى مطروح': ['مرسى مطروح'],
            'المنيا': ['العدوة', 'مغاغة', 'بني مزار', 'مطاي', 'سمالوط', 'مركز المنيا', 'مدينة المنيا', 'أبو قرقاص', 'ملوي', 'دير مواس'],
            'بور سعيد': ['بورسعيد'],
            'قنا': ['قنا', 'قوص', 'مدينة قفط', 'دشنا', 'نقادة', 'نجع حمادي', 'فرشوط', 'أبوتشت'],
            'المنوفية': ['قويسنا', 'بركة السبع', 'السادات', 'الشهداء', 'تلا', 'شبين الكوم', 'الباجور', 'منوف', 'أشمون'],
            'سوهاج': ['طما', 'طهطا', 'جهينة', 'مدينة سوهاج', 'المراغة', 'أخميم', 'ساقلته', 'المنشأة', 'جرجا', 'البلينا', 'دار السلام', 'العسيرات'],
            'السويس': ['السويس'],
            'الوادي الجديد': ['الخارجة', 'الداخلة', 'الفرافرة'],
            'جنوب سيناء': ['جنوب سيناء', 'شرم الشيخ', 'دهب']
        };

        // ============================================================
        //  🔐 تسجيل الدخول
        // ============================================================
        async function doLogin() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!phone || !password) {
                errorDiv.textContent = "⚠️ يرجى إدخال رقم الهاتف وكلمة المرور";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'login');
                formData.append('phone', phone);
                formData.append('password', password);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = await res.json();
                console.log('✅ Login response:', data);

                if (data.success) {
                    currentUser = {
                        phone: phone,
                        password: password,
                        name: data.name,
                        role: data.role
                    };
                    errorDiv.classList.add('hidden');
                    showDashboard();
                    showToast('✅ مرحباً ' + data.name, 'success');
                } else {
                    errorDiv.textContent = data.msg || "❌ رقم الهاتف أو كلمة المرور غير صحيحة";
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = "⚠️ فشل الاتصال بالخادم: " + e.message;
                errorDiv.classList.remove('hidden');

            container.innerHTML = `

        function updateSummary(shipments) {
            const waiting = shipments.filter(s => s.status && s.status.includes('انتظار')).length;
            const tracking = shipments.filter(s => s.status && s.status.includes('تتبع')).length;
            const done = shipments.filter(s => s.status && s.status.includes('تم')).length;

            document.getElementById('totalCount').textContent = shipments.length;
            document.getElementById('waitingCount').textContent = waiting;
            document.getElementById('trackingCount').textContent = tracking;
            document.getElementById('doneCount').textContent = done;
        }

        function renderShipments(shipments, isAdmin) {
            const content = document.getElementById('contentArea');

            if (!shipments || shipments.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>لا توجد شحنات حتى الآن</p>
                        ${!isAdmin ? '<button onclick="showAddShipmentForm()" style="margin-top:12px;padding:10px 30px;background:#e60012;color:white;border:none;border-radius:10px;font-size:15px;cursor:pointer;">➕ إضافة شحنة</button>' : ''}
                    </div>
                `;
                return;
            }

            let html = '';
            shipments.forEach((s, index) => {
                let statusClass = 'status-waiting';
                let statusText = s.status || 'في انتظار التتبع';
                if (statusText.includes('تتبع')) statusClass = 'status-tracking';
                else if (statusText.includes('تم')) statusClass = 'status-done';

                let actionsHtml = '';
                if (s.trackingNumber) {
                    actionsHtml += `<button class="btn-track" onclick="trackShipment('${s.trackingNumber}')">📍 تتبع</button>`;
                }
                if (isAdmin && !s.trackingNumber) {
                    actionsHtml += `<button class="btn-add-tracking" onclick="showAddTracking('${s.id}')">🔢 إضافة تتبع</button>`;
                }
                if (isAdmin) {
                    actionsHtml += `<button class="btn-delete" onclick="deleteShipment('${s.id}')">🗑️ حذف</button>`;
                }

                const clientInfo = isAdmin ? `
                    <div class="row"><span class="label">📱 صاحب الشحنة:</span><span class="value ar">${s.clientPhone || 'غير معروف'}</span></div>
                ` : '';

                html += `
                    <div class="shipment-card">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${clientInfo}
                        <div class="row"><span class="label">🔢 رقم الشحنة:</span><span class="value">${s.id || '#' + (index + 1)}</span></div>
                        <div class="row"><span class="label">📅 التاريخ:</span><span class="value">${s.date || ''}</span></div>
                        <div class="row"><span class="label">👤 المستلم:</span><span class="value ar">${s.customerName || ''}</span></div>
                        <div class="row"><span class="label">📱 هاتف المستلم:</span><span class="value">${s.customerPhone || ''}</span></div>
                        <div class="row"><span class="label">📍 المحافظة:</span><span class="value ar">${s.receivingProvince || ''}</span></div>
                        <div class="row"><span class="label">🏙️ المدينة:</span><span class="value ar">${s.receivingCity || ''}</span></div>
                        <div class="row"><span class="label">📍 العنوان:</span><span class="value ar">${s.customerAddress || ''}</span></div>
                        <div class="row"><span class="label">📦 المنتج:</span><span class="value ar">${s.productName || ''} (${s.productQuantity || '1'})</span></div>
                        ${s.notes ? `<div class="row"><span class="label">📝 ملاحظات:</span><span class="value ar">${s.notes}</span></div>` : ''}
                        ${s.trackingNumber ? `<div class="row"><span class="label">🚚 رقم التتبع:</span><span class="value">${s.trackingNumber}</span></div>` : ''}
                        ${actionsHtml ? `<div class="card-actions">${actionsHtml}</div>` : ''}
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // ============================================================
        //  إرسال الشحنة - حسب ترتيب الشيت بالضبط
        // ============================================================
        async function submitShipment() {
            const receiverName = document.getElementById('f_receiverName').value.trim();
            const receiverPhone = document.getElementById('f_receiverPhone').value.trim();
            const receiverPhone2 = document.getElementById('f_receiverPhone2').value.trim();
            const governorate = document.getElementById('f_governorate').value;
            const city = document.getElementById('f_city').value;
            const address = document.getElementById('f_address').value.trim();
            
            const senderName = document.getElementById('f_senderName').value.trim();
            const senderPhone = document.getElementById('f_senderPhone').value.trim();
            const senderPhone2 = document.getElementById('f_senderPhone2').value.trim();
            const senderGovernorate = document.getElementById('f_senderGovernorate').value;
            const senderCity = document.getElementById('f_senderCity').value;
            const senderAddress = document.getElementById('f_senderAddress').value.trim();
            
            const product = document.getElementById('f_product').value.trim();
            const quantity = document.getElementById('f_quantity').value.trim() || '1';
            const notes = document.getElementById('f_notes').value.trim();
            
            const errorDiv = document.getElementById('shipError');

            // التحقق من الحقول المطلوبة
            if (!receiverName || !receiverPhone || !governorate || !city || !address ||
                !senderName || !senderPhone || !senderGovernorate || !senderCity || !senderAddress || !product) {
                errorDiv.textContent = '⚠️ يرجى ملء جميع الحقول المطلوبة (*)';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!currentUser) {
                errorDiv.textContent = '⚠️ يرجى تسجيل الدخول أولاً';
                errorDiv.classList.remove('hidden');
                return;
            }

            // ============================================================
            //  ترتيب الأعمدة حسب الشيت بالضبط:
            //  A: مكان رقم التتبع = ' + رقم هاتف العميل
            //  B: العميل = اسم المستلم
            //  C: العميل = هاتف المستلم
            //  D: العميل = هاتف آخر للمستلم
            //  E: العميل = المحافظة
            //  F: العميل = المدينة
            //  G: اجباري = "."
            //  H: العميل = العنوان التفصيلي
            //  I: (فارغ)
            //  J: (فارغ)
            //  K: (فارغ)
            //  L: اجباري = "Standard"
            //  M: (فارغ)
            //  N: اجباري = "Egypt"
            //  O: (فارغ)
            //  P: (فارغ)
            //  Q: العميل = اسم المرسل
            //  R: (فارغ)
            //  S: (فارغ)
            //  T: اجباري رقم الهاتف الخاص بالعميل = رقم هاتف العميل المسجل به الدخول
            // ============================================================

            const formData = new URLSearchParams();
            formData.append('action', 'addShipment');
            
            // A: مكان رقم التتبع = ' + رقم هاتف العميل
            formData.append('trackingPlace', "'" + currentUser.phone);
            
            // B: اسم المستلم
            formData.append('receiverName', receiverName);
            
            // C: هاتف المستلم
            formData.append('receiverPhone', receiverPhone);
            
            // D: هاتف آخر للمستلم
            formData.append('receiverPhone2', receiverPhone2);
            
            // E: المحافظة
            formData.append('governorate', governorate);
            
            // F: المدينة
            formData.append('city', city);
            
            // G: اجباري = "."
            formData.append('dot', '.');
            
            // H: العنوان التفصيلي
            formData.append('address', address);
            
            // I, J, K: فارغ
            formData.append('empty1', '');
            formData.append('empty2', '');
            formData.append('empty3', '');
            
            // L: اجباري = "Standard"
            formData.append('productType', 'Standard');
            
            // M: فارغ
            formData.append('empty4', '');
            
            // N: اجباري = "Egypt"
            formData.append('country', 'Egypt');
            
            // O, P: فارغ
            formData.append('empty5', '');
            formData.append('empty6', '');
            
            // Q: اسم المرسل
            formData.append('senderName', senderName);
            
            // R, S: فارغ
            formData.append('empty7', '');
            formData.append('empty8', '');
            
            // T: اجباري رقم الهاتف الخاص بالعميل
            formData.append('clientPhone', currentUser.phone);
            
            // بيانات إضافية للشحنة
            formData.append('senderPhone', senderPhone);
            formData.append('senderPhone2', senderPhone2);
            formData.append('senderGovernorate', senderGovernorate);
            formData.append('senderCity', senderCity);
            formData.append('senderAddress', senderAddress);
            formData.append('productName', product);
            formData.append('productQuantity', quantity);
            formData.append('notes', notes);
            
            // بيانات المصادقة
            formData.append('phone', currentUser.phone);
            formData.append('password', currentUser.password);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();
                console.log('📥 addShipment response:', data);

                if (data.success) {
                    closeModal();
                    loadMyShipments();
                    showToast('✅ تم إضافة الشحنة بنجاح!', 'success');
                } else {
                    errorDiv.textContent = data.msg || '❌ فشل الإضافة';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = '⚠️ فشل الاتصال بالخادم: ' + e.message;
                errorDiv.classList.remove('hidden');
                console.error('❌ submitShipment error:', e);
            }
        }

                });

        // ============================================================
        //  🚚 تتبع الشحنة
        // ============================================================
        async function trackShipment(billCode) {
            openModal(`
                <div class="modal-title">🚚 تتبع الشحنة</div>
                <div class="loading"><div class="spinner"></div><div>جاري التتبع...</div></div>
            `);

            try {
                const res = await fetch(`${API_URL}?action=track&billCode=${billCode}`);
                const data = await res.json();

                if (data.code === "1" && data.data && data.data[0]) {
                    let html = `<div class="modal-title">🚚 مسار الشحنة: ${billCode}</div>`;
                    const details = data.data[0].details || [];
                    if (details.length === 0) {
                        html += `<p style="text-align:center;color:#999;padding:20px;">لا توجد تفاصيل تتبع متاحة</p>`;
                    } else {
                        details.forEach(d => {
                            html += `
                                <div class="timeline-item">
                                    <div class="time">🕐 ${d.scanTime || ''}</div>
                                    <div class="event">📌 ${d.desc || d.scanType || ''}</div>
                                    <div class="location">📍 ${d.scanNetworkName || ''} ${d.scanNetworkCity ? '- ' + d.scanNetworkCity : ''}</div>
                                    ${d.probleDescription ? `<div class="problem">⚠️ ${d.probleDescription}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    document.getElementById('modalBody').innerHTML = html;
                } else {
                    document.getElementById('modalBody').innerHTML = `
                        <div class="modal-title">🚚 تتبع الشحنة</div>
                        <div style="text-align:center;padding:20px;color:#dc3545;">
                            <div style="font-size:48px;margin-bottom:12px;">❌</div>
                            <p>فشل تتبع الشحنة</p>
                            <p style="font-size:13px;color:#999;">رقم التتبع: ${billCode}</p>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('modalBody').innerHTML = `
                    <div class="modal-title">🚚 تتبع الشحنة</div>
                    <div style="text-align:center;padding:20px;color:#dc3545;">
                        <div style="font-size:48px;margin-bottom:12px;">📡</div>
                        <p>فشل الاتصال بخدمة التتبع: ${e.message}</p>
                    </div>
                `;
            }
        }

        // ============================================================
        //  👥 إدارة العملاء (للأدمن)
        // ============================================================
        async function showClients() {
            openModal(`
                <div class="modal-title">👥 إدارة العملاء</div>
                <button class="submit-btn green" onclick="showAddClientForm()" style="margin-bottom:14px;">➕ إنشاء حساب عميل جديد</button>
                <div id="clientList"><div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div></div>
            `);

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'allClients');
                formData.append('adminPhone', currentUser.phone);
                formData.append('adminPassword', currentUser.password);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                const listDiv = document.getElementById('clientList');
                if (data.success) {
                    if (data.clients.length === 0) {
                        listDiv.innerHTML = `<p style="text-align:center;color:#999;padding:20px;">لا يوجد عملاء حتى الآن</p>`;
                    } else {
                        let html = '';
                        data.clients.forEach(c => {
                            html += `
                                <div class="client-card">
                                    <div class="client-info">
                                        <div class="name">${c.name || 'غير معروف'}</div>
                                        <div class="phone">📱 ${c.phone || ''}</div>
                                        <div class="created">📅 ${c.created || ''}</div>
                                    </div>
                                    <div class="client-actions">
                                        <button onclick="deleteClient('${c.phone}')">🗑️ حذف</button>
                                    </div>
                                </div>
                            `;
                        });
                        listDiv.innerHTML = html;
                    }
                } else {
                    listDiv.innerHTML = `<p style="color:#dc3545;">${data.msg || 'فشل التحميل'}</p>`;
                }
            } catch (e) {
                document.getElementById('clientList').innerHTML = `<p style="color:#dc3545;">⚠️ فشل الاتصال بالخادم: ${e.message}</p>`;
            }
        }

        function showAddClientForm() {
            openModal(`
                <div class="modal-title">➕ إنشاء حساب عميل جديد</div>
                <div class="form-group"><label>👤 اسم العميل *</label><input id="nc_name" placeholder="الاسم الكامل"></div>
                <div class="form-group"><label>📱 رقم الهاتف *</label><input id="nc_phone" placeholder="مثال: 011xxxxxxxx" dir="ltr"></div>
                <div class="form-group"><label>🔒 كلمة المرور *</label><input id="nc_password" type="password" placeholder="كلمة المرور للدخول" dir="ltr"></div>
                <button class="submit-btn green" onclick="createClient()">✅ إنشاء الحساب</button>
                <button class="submit-btn gray" onclick="showClients()" style="margin-top:8px;">↩️ رجوع</button>
                <div id="clientError" class="error-msg hidden"></div>
            `);
        }

        async function createClient() {
            const name = document.getElementById('nc_name').value.trim();
            const phone = document.getElementById('nc_phone').value.trim();
            const password = document.getElementById('nc_password').value.trim();
            const errorDiv = document.getElementById('clientError');

            if (!name || !phone || !password) {
                errorDiv.textContent = '⚠️ يرجى ملء جميع الحقول';
                errorDiv.classList.remove('hidden');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', 'createClient');
            formData.append('adminPhone', currentUser.phone);
            formData.append('adminPassword', currentUser.password);
            formData.append('clientName', name);
            formData.append('clientPhone', phone);
            formData.append('clientPassword', password);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    showClients();
                    showToast('✅ تم إنشاء الحساب بنجاح!', 'success');
                } else {
                    errorDiv.textContent = data.msg || '❌ فشل الإنشاء';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = '⚠️ فشل الاتصال بالخادم: ' + e.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function deleteClient(phone) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا العميل؟')) return;

            const formData = new URLSearchParams();
            formData.append('action', 'deleteClient');
            formData.append('phone', phone);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    showClients();
                    showToast('✅ تم حذف العميل بنجاح', 'success');
                } else {
                    showToast(data.msg || '❌ فشل الحذف', 'error');
                }
            } catch (e) {
                showToast('⚠️ فشل الاتصال بالخادم: ' + e.message, 'error');
            }
        }

        // ============================================================
        //  🖥️ دوال المودال
        // ============================================================
        function openModal(html) {
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>

</body>
</html>
