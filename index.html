<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تتبع الشحنة الفوري</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="font-family: Tahoma; padding: 20px; background: #f9f9f9;">

  <h2>تتبع الشحنة الفوري</h2>
  <input type="text" id="billCode" value="JEG000498643576" placeholder="أدخل رقم البوليصة" style="padding:10px; width:280px; font-size:16px;">
  <button onclick="trackShipment()" style="padding:10px 20px; background:#007bff; color:#fff; border:none; cursor:pointer; font-size:16px;">تتبع</button>
  <pre id="result" style="background:#fff; padding:15px; margin-top:15px; border:1px solid #ddd; direction:ltr; text-align:left; max-height:400px; overflow-y:auto;"></pre>

  <script>
    async function trackShipment() {
      const code = document.getElementById('billCode').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!code) {
        resultDiv.innerText = "الرجاء إدخال رقم البوليصة.";
        return;
      }

      resultDiv.innerText = "جاري حساب التوقيع والاتصال...";

      const apiAccount = "292508153084379141";
      const privateKey = "a0a1047cce70493c9d5d29704f05d0d9";
      const timestamp = Date.now().toString();
      
      // التأكد من عدم وجود مسافات زائدة في الـ JSON
      const bizContentStr = JSON.stringify({ billCodes: [code] });

      // تجميع النص المراد توقيعه بدقة مطابقة للتوثيق
      const dataToSign = bizContentStr + timestamp + privateKey;
      
      // استخراج الـ MD5 بصيغة بايتات ثم تحويلها إلى Base64 بشكل صحيح تماماً
      const hashDigest = CryptoJS.MD5(dataToSign);
      const digest = CryptoJS.enc.Base64.stringify(hashDigest);

      const targetUrl = 'https://demoopenapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace?uuid=c7f405da081d436d8ee146b59f885dce';
      const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

      try {
        const res = await fetch(proxyUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'apiAccount': apiAccount,
            'timestamp': timestamp,
            'digest': digest
          },
          body: 'bizContent=' + encodeURIComponent(bizContentStr)
        });

        const data = await res.json();
        resultDiv.innerText = JSON.stringify(data, null, 2);
      } catch (error) {
        resultDiv.innerText = "حدث خطأ في الاتصال: " + error.message;
      }
    }
  </script>

</body>
</html>
