<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J&T Tracking</title>

<!-- CryptoJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body>

<input id="tracking" placeholder="Tracking Number">
<button onclick="track()">Track</button>

<pre id="result"></pre>

<script>

const apiAccount = "866958120939696147";
const privateKey = "29535fad70ca4688aaa5b462320eb096";

const url =
"https://openapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace";

function createDigest(bizContent){

    // MD5
    const md5 = CryptoJS.MD5(
        bizContent + privateKey
    );

    // Base64
    return CryptoJS.enc.Base64.stringify(md5);
}

async function track(){

    const billCode =
        document.getElementById("tracking").value.trim();

    const bizContent = JSON.stringify({
        billCodes: billCode
    });

    const digest = createDigest(bizContent);

    const timestamp = Date.now();

    const body =
        new URLSearchParams({
            bizContent: bizContent
        });

    try{

        const response = await fetch(url,{
            method:"POST",
            headers:{
                "apiAccount":apiAccount,
                "timestamp":timestamp,
                "digest":digest,
                "Content-Type":
                "application/x-www-form-urlencoded"
            },
            body:body
        });

        const json =
            await response.json();

        document.getElementById("result")
            .textContent =
            JSON.stringify(json,null,4);

    }catch(e){

        document.getElementById("result")
            .textContent =
            e.toString();

    }

}

</script>

</body>
</html>
