<input type="text" id="billCode" value="JEG000477418058" placeholder="أدخل رقم البوليصة">
<button onclick="trackShipment()">تتبع</button>
<pre id="result"></pre>
<script>
  async function trackShipment() {
    const code = document.getElementById('billCode').value;
    const resultDiv = document.getElementById('result');
    resultDiv.innerText = "جاري البحث...";
    
    const formData = new URLSearchParams();
    formData.append('billCode', code);
    
    try {
      const res = await fetch('https://openapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace?uuid=c7f405da081d436d8ee146b59f885dce', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });
      const data = await res.json();
      resultDiv.innerText = JSON.stringify(data, null, 2);
    } catch (error) {
      resultDiv.innerText = "حدث خطأ في الاتصال: " + error.message;
    }
  }
</script>
