<input type="text" id="billCode" placeholder="أدخل رقم البوليصة">
<button onclick="trackShipment()">تتبع</button>
<pre id="result"></pre>
<script>
  async function trackShipment() {
    const code = document.getElementById('billCode').value;
    const res = await fetch('https://openapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace?uuid=YOUR_UUID', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ billCode: code })
    });
    const data = await res.json();
    document.getElementById('result').innerText = JSON.stringify(data, null, 2);
  }
</script>
