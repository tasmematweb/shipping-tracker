<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تتبع الشحنة المباشر</title>
</head>
<body style="font-family: Tahoma; padding: 20px; background: #f9f9f9;">

  <h2>تتبع الشحنة (تجربة فورية)</h2>
  <input type="text" id="billCode" value="JEG000496480982" placeholder="أدخل رقم البوليصة" style="padding:10px; width:280px; font-size:16px;">
  <button onclick="trackShipment()" style="padding:10px 20px; background:#007bff; color:#fff; border:none; cursor:pointer; font-size:16px;">تتبع</button>
  <pre id="result" style="background:#fff; padding:15px; margin-top:15px; border:1px solid #ddd; direction:ltr; text-align:left; max-height:400px; overflow-y:auto;"></pre>

  <script>
    async function trackShipment() {
      const code = document.getElementById('billCode').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!code) {
        resultDiv.innerText = "الرجاء إدخال رقم البوليصة.";
        return;
      }

      resultDiv.innerText = "جاري الاتصال وجلب بيانات الشحنة...";

      const apiAccount = "292508153084379141";
      const timestamp = Date.now().toString();
      const bizContent = JSON.stringify({ billCodes: [code] });

      // بيانات وتفاصيل توقيع تجريبية مسبقة لبيئة الاختبار
      const targetUrl = 'https://demoopenapi.jtjms-eg.com/webopenplatformapi/api/logistics/trace?uuid=c7f405da081d436d8ee146b59f885dce';
      
      // استخدام وسيط عام لتجاوز حظر المتصفح ونقل الطلب للخادم
      const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);

      try {
        const res = await fetch(targetUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'apiAccount': apiAccount,
            'timestamp': timestamp,
            'digest': 'DUMMY_DIGEST_FOR_TEST'
          },
          body: new URLSearchParams({ bizContent })
        });

        const data = await res.json();
        resultDiv.innerText = JSON.stringify(data, null, 2);
      } catch (error) {
        // إذا ظهر خطأ CORS من المتصفح المباشر، جرب الطريقة السريعة عبر الـ Proxy العام:
        try {
          const proxyRes = await fetch('https://corsproxy.io/?' + encodeURIComponent(targetUrl), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'apiAccount': apiAccount,
              'timestamp': timestamp,
              'digest': 'TEST'
            },
            body: new URLSearchParams({ bizContent })
          });
          const proxyData = await proxyRes.json();
          resultDiv.innerText = JSON.stringify(proxyData, null, 2);
        } catch (err) {
          resultDiv.innerText = "حدث خطأ: تأكد من إدخال البيانات أو استخدام وسيط الدعم الفني.";
        }
      }
    }
  </script>

</body>
</html>
