<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تتبع وإدارة شحنات J&T</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 10px;
            direction: rtl;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            min-height: 95vh;
            position: relative;
        }
        .hidden {
            display: none !important;
        }
        /* ===== صفحة تسجيل الدخول ===== */
        .login-page {
            padding: 40px 25px 30px;
            text-align: center;
            background: white;
        }
        .login-page .logo {
            font-size: 72px;
            margin-bottom: 8px;
            display: block;
        }
        .login-page .brand {
            color: #e60012;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .login-page .sub-brand {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .login-page .input-group {
            margin-bottom: 16px;
            text-align: right;
        }
        .login-page .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .login-page .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
            transition: border 0.2s;
            text-align: right;
        }
        .login-page .input-group input:focus {
            border-color: #e60012;
            outline: none;
            background: white;
        }
        .login-page .login-btn {
            width: 100%;
            padding: 16px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .login-page .login-btn:active {
            background: #cc0010;
        }
        .login-page .forgot-link {
            display: block;
            margin-top: 16px;
            color: #0066cc;
            font-size: 14px;
            text-decoration: none;
        }
        .login-page .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 14px;
            padding: 8px;
            background: #ffeaea;
            border-radius: 8px;
        }
        .login-page .signup-link {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .login-page .signup-link a {
            color: #e60012;
            font-weight: 600;
            text-decoration: none;
        }

        /* ===== الهيدر ===== */
        .app-header {
            background: #e60012;
            padding: 16px 20px 14px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .app-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header .user-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
        .app-header .user-info .name {
            font-size: 15px;
            font-weight: 600;
        }
        .app-header .user-info .role {
            font-size: 11px;
            opacity: 0.8;
        }
        .app-header .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .app-header .header-actions button {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .app-header .header-actions button:active {
            background: rgba(255, 255, 255, 0.35);
        }
        .app-header .header-actions button.green {
            background: #28a745;
        }
        .app-header .header-actions button.blue {
            background: #0066cc;
        }
        .app-header .header-actions button.orange {
            background: #ff9800;
        }
        .app-header .header-actions button.outline {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
        }

        /* ===== ملخص ===== */
        .summary-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 12px 14px;
            background: #f8f8f8;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #eee;
        }
        .summary-box .stat {
            text-align: center;
            background: white;
            padding: 8px 4px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }
        .summary-box .stat .count {
            font-size: 22px;
            font-weight: 700;
            color: #e60012;
        }
        .summary-box .stat .label {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        /* ===== المحتوى ===== */
        .content-area {
            padding: 12px 14px 20px;
        }
        .loading {
            text-align: center;
            padding: 40px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e60012;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        /* ===== بطاقة الشحنة ===== */
        .shipment-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
        }
        .shipment-card .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .status-waiting {
            background: #fff3cd;
            color: #856404;
        }
        .status-tracking {
            background: #d1ecf1;
            color: #0c5460;
        }
        .status-done {
            background: #d4edda;
            color: #155724;
        }
        .shipment-card .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            color: #555;
            border-bottom: 1px dashed #f0f0f0;
        }
        .shipment-card .row:last-child {
            border-bottom: none;
        }
        .shipment-card .row .label {
            color: #999;
            font-weight: 400;
        }
        .shipment-card .row .value {
            font-weight: 500;
            color: #222;
            text-align: left;
            direction: ltr;
        }
        .shipment-card .row .value.ar {
            direction: rtl;
            text-align: right;
        }
        .shipment-card .card-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shipment-card .card-actions button {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            min-width: 80px;
        }
        .btn-track {
            background: #0066cc;
            color: white;
        }
        .btn-add-tracking {
            background: #28a745;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .btn-edit {
            background: #ff9800;
            color: white;
        }

        /* ===== المودال ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 16px;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px 20px;
            position: relative;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-box .close-btn {
            position: absolute;
            top: 14px;
            left: 16px;
            font-size: 26px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }
        .modal-box .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 18px;
            padding-left: 30px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            background: #fafafa;
            transition: border 0.2s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #e60012;
            outline: none;
            background: white;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .modal-box .submit-btn {
            width: 100%;
            padding: 14px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }
        .modal-box .submit-btn.green {
            background: #28a745;
        }
        .modal-box .submit-btn.gray {
            background: #999;
        }
        .modal-box .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 10px;
            padding: 8px;
            background: #ffeaea;
            border-radius: 8px;
            text-align: center;
        }

        /* ===== التتبع (Timeline) ===== */
        .timeline-item {
            border-right: 3px solid #e60012;
            padding: 10px 16px 10px 0;
            margin-right: 8px;
            margin-bottom: 14px;
            background: #fafafa;
            border-radius: 0 10px 10px 0;
        }
        .timeline-item .time {
            color: #999;
            font-size: 12px;
        }
        .timeline-item .event {
            font-weight: 600;
            color: #222;
            margin: 4px 0;
        }
        .timeline-item .location {
            color: #666;
            font-size: 13px;
        }
        .timeline-item .problem {
            color: #dc3545;
            font-size: 13px;
            margin-top: 4px;
        }

        /* ===== إدارة العملاء ===== */
        .client-card {
            background: #fafafa;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }
        .client-card .client-info {
            flex: 1;
        }
        .client-card .client-info .name {
            font-weight: 600;
            color: #222;
        }
        .client-card .client-info .phone {
            font-size: 13px;
            color: #666;
        }
        .client-card .client-info .created {
            font-size: 11px;
            color: #aaa;
        }
        .client-card .client-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            background: #dc3545;
            color: white;
        }

        /* ===== إضافات ===== */
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .gap-8 {
            gap: 8px;
        }
        .flex {
            display: flex;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }

        /* ===== رسالة الخطأ ===== */
        .error-box {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            color: #d32f2f;
        }
        .error-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        .error-box .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .error-box .sub {
            font-size: 13px;
            color: #666;
        }

        /* ===== Scrollbar ===== */
        .modal-box::-webkit-scrollbar {
            width: 4px;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- ===== صفحة تسجيل الدخول ===== -->
        <div id="loginPage" class="login-page">
            <span class="logo">📦</span>
            <div class="brand">نظام تتبع شحنات J&T</div>
            <div class="sub-brand">إدارة الشحنات بكل سهولة</div>

            <div class="input-group">
                <label>📱 رقم الهاتف</label>
                <input type="text" id="loginPhone" placeholder="أدخل رقم الهاتف" dir="ltr" value="01140074870">
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" dir="ltr" value="123456">
            </div>

            <button class="login-btn" onclick="doLogin()">🚀 دخول</button>
            <a href="#" class="forgot-link" onclick="alert('تواصل مع الدعم الفني')">نسيت كلمة المرور؟</a>
            <div id="loginError" class="error-msg hidden"></div>
            <div class="signup-link">ليس لديك حساب؟ <a href="#" onclick="alert('تواصل مع الإدارة لإنشاء حساب')">إنشاء حساب</a></div>
        </div>

        <!-- ===== لوحة التحكم ===== -->
        <div id="dashboard" class="hidden">
            <!-- الهيدر -->
            <div class="app-header">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div>
                        <div class="name" id="userName">مرحباً</div>
                        <div class="role" id="userRole">عميل</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="addShipmentBtn" class="green hidden" onclick="showAddShipmentForm()">➕ إضافة</button>
                    <button id="clientsBtn" class="blue hidden" onclick="showClients()">👥 عملاء</button>
                    <button id="allShipmentsBtn" class="orange hidden" onclick="loadAllShipments()">📋 الكل</button>
                    <button class="outline" onclick="logout()">🚪 خروج</button>
                </div>
            </div>

            <!-- ملخص الإحصائيات -->
            <div id="summaryBox" class="summary-box hidden">
                <div class="stat"><div class="count" id="totalCount">0</div><div class="label">كل الشحنات</div></div>
                <div class="stat"><div class="count" id="waitingCount" style="color:#856404;">0</div><div class="label">قيد الانتظار</div></div>
                <div class="stat"><div class="count" id="trackingCount" style="color:#0c5460;">0</div><div class="label">قيد التتبع</div></div>
                <div class="stat"><div class="count" id="doneCount" style="color:#155724;">0</div><div class="label">تم التوصيل</div></div>
            </div>

            <!-- المحتوى -->
            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <!-- ===== مودال ===== -->
    <div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this) closeModal()">
        <div class="modal-box" id="modalBox">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  التكوين الأساسي - رابط الـ Web App
        // ============================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxy8waLDDYz3A2smsOZnZtccUcOSwwAAsOIO9ehCJskfW8ttbnc0q9LTmmnNsV4WOFI/exec";
        let currentUser = null;
        let currentShipments = [];

        // ============================================================
        //  دوال تسجيل الدخول والخروج
        // ============================================================
        async function doLogin() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!phone || !password) {
                errorDiv.textContent = "⚠️ يرجى إدخال رقم الهاتف وكلمة المرور";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_URL}?action=login&phone=${phone}&password=${password}`);
                const data = await res.json();

                if (data.success) {
                    currentUser = data;
                    errorDiv.classList.add('hidden');
                    showDashboard();
                } else {
                    errorDiv.textContent = data.msg || "❌ فشل تسجيل الدخول";
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = "⚠️ فشل الاتصال بالخادم";
                errorDiv.classList.remove('hidden');
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginPhone').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        // ============================================================
        //  عرض لوحة التحكم
        // ============================================================
        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            const isAdmin = currentUser.role === 'admin';
            document.getElementById('userName').textContent = currentUser.name || 'مستخدم';
            document.getElementById('userRole').textContent = isAdmin ? '👑 أدمن' : '👤 عميل';
            document.getElementById('userAvatar').textContent = (currentUser.name || 'U')[0].toUpperCase();

            // إظهار/إخفاء الأزرار حسب الصلاحية
            document.getElementById('addShipmentBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('clientsBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('allShipmentsBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('summaryBox').classList.toggle('hidden', !isAdmin);

            if (isAdmin) {
                loadAllShipments();
            } else {
                loadMyShipments();
            }
        }

        // ============================================================
        //  تحميل الشحنات (للعميل)
        // ============================================================
        async function loadMyShipments() {
            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div>';

            try {
                const res = await fetch(`${API_URL}?action=myShipments&phone=${currentUser.phone}&password=${currentUser.password}`);
                const data = await res.json();

                if (data.success) {
                    currentShipments = data.shipments || [];
                    renderShipments(currentShipments, false);
                } else {
                    showError(content, data.msg || 'فشل تحميل الشحنات');
                }
            } catch (e) {
                showError(content, 'فشل الاتصال بالخادم');
            }
        }

        // ============================================================
        //  تحميل جميع الشحنات (للأدمن)
        // ============================================================
        async function loadAllShipments() {
            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div>';

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'allShipments');
                formData.append('adminPhone', currentUser.phone);
                formData.append('adminPassword', currentUser.password);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    currentShipments = data.shipments || [];
                    updateSummary(currentShipments);
                    renderShipments(currentShipments, true);
                } else {
                    showError(content, data.msg || 'فشل تحميل الشحنات');
                }
            } catch (e) {
                showError(content, 'فشل الاتصال بالخادم');
            }
        }

        // ============================================================
        //  عرض رسالة خطأ
        // ============================================================
        function showError(container, message) {
            container.innerHTML = `
                <div class="error-box">
                    <span class="icon">❌</span>
                    <div class="title">فشل تحميل الشحنة</div>
                    <div class="sub">${message}</div>
                    <button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;background:#e60012;color:white;border:none;border-radius:8px;cursor:pointer;">🔄 إعادة المحاولة</button>
                </div>
            `;
        }

        // ============================================================
        //  تحديث الملخص
        // ============================================================
        function updateSummary(shipments) {
            const waiting = shipments.filter(s => s.status && s.status.includes('انتظار')).length;
            const tracking = shipments.filter(s => s.status && s.status.includes('تتبع')).length;
            const done = shipments.filter(s => s.status && s.status.includes('تم')).length;

            document.getElementById('totalCount').textContent = shipments.length;
            document.getElementById('waitingCount').textContent = waiting;
            document.getElementById('trackingCount').textContent = tracking;
            document.getElementById('doneCount').textContent = done;
        }

        // ============================================================
        //  عرض الشحنات
        // ============================================================
        function renderShipments(shipments, isAdmin) {
            const content = document.getElementById('contentArea');

            if (!shipments || shipments.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>لا توجد شحنات حتى الآن</p>
                        ${!isAdmin ? '<button onclick="showAddShipmentForm()" style="margin-top:12px;padding:10px 30px;background:#e60012;color:white;border:none;border-radius:10px;font-size:15px;cursor:pointer;">➕ إضافة شحنة</button>' : ''}
                    </div>
                `;
                return;
            }

            let html = '';
            shipments.forEach((s, index) => {
                let statusClass = 'status-waiting';
                let statusText = s.status || 'في انتظار التتبع';
                if (statusText.includes('تتبع')) statusClass = 'status-tracking';
                else if (statusText.includes('تم')) statusClass = 'status-done';

                let actionsHtml = '';
                if (s.trackingNumber) {
                    actionsHtml += `<button class="btn-track" onclick="trackShipment('${s.trackingNumber}')">📍 تتبع</button>`;
                }
                if (isAdmin && !s.trackingNumber) {
                    actionsHtml += `<button class="btn-add-tracking" onclick="showAddTracking('${s.id}')">🔢 إضافة تتبع</button>`;
                }
                if (isAdmin) {
                    actionsHtml += `<button class="btn-delete" onclick="deleteShipment('${s.id}')">🗑️ حذف</button>`;
                }

                const clientInfo = isAdmin ? `
                    <div class="row"><span class="label">📱 صاحب الشحنة:</span><span class="value ar">${s.clientPhone || 'غير معروف'}</span></div>
                ` : '';

                html += `
                    <div class="shipment-card">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${clientInfo}
                        <div class="row"><span class="label">🔢 رقم الشحنة:</span><span class="value">${s.id || '#' + (index + 1)}</span></div>
                        <div class="row"><span class="label">📅 التاريخ:</span><span class="value">${s.date || ''}</span></div>
                        <div class="row"><span class="label">👤 المستلم:</span><span class="value ar">${s.customerName || ''}</span></div>
                        <div class="row"><span class="label">📱 هاتف المستلم:</span><span class="value">${s.customerPhone || ''}</span></div>
                        <div class="row"><span class="label">📍 العنوان:</span><span class="value ar">${s.customerAddress || ''}</span></div>
                        <div class="row"><span class="label">📦 المنتج:</span><span class="value ar">${s.productName || ''} (${s.productQuantity || '1'})</span></div>
                        ${s.notes ? `<div class="row"><span class="label">📝 ملاحظات:</span><span class="value ar">${s.notes}</span></div>` : ''}
                        ${s.trackingNumber ? `<div class="row"><span class="label">🚚 رقم التتبع:</span><span class="value">${s.trackingNumber}</span></div>` : ''}
                        ${actionsHtml ? `<div class="card-actions">${actionsHtml}</div>` : ''}
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // ============================================================
        //  إضافة شحنة جديدة (للعميل)
        // ============================================================
        function showAddShipmentForm() {
            openModal(`
                <div class="modal-title">📦 إضافة شحنة جديدة</div>
                <div class="form-group"><label>👤 اسم المستلم *</label><input id="f_name" placeholder="الاسم الكامل"></div>
                <div class="form-group"><label>📱 هاتف المستلم *</label><input id="f_phone" placeholder="مثال: 010xxxxxxxx" dir="ltr"></div>
                <div class="form-group"><label>📍 العنوان *</label><input id="f_address" placeholder="العنوان بالتفصيل"></div>
                <div class="form-group"><label>📦 اسم المنتج *</label><input id="f_product" placeholder="اسم المنتج"></div>
                <div class="form-group"><label>🔢 الكمية</label><input id="f_quantity" type="number" value="1" min="1"></div>
                <div class="form-group"><label>📝 ملاحظات</label><textarea id="f_notes" placeholder="ملاحظات إضافية"></textarea></div>
                <button class="submit-btn" onclick="submitShipment()">✅ إضافة الشحنة</button>
                <div id="shipError" class="error-msg hidden"></div>
            `);
        }

        async function submitShipment() {
            const name = document.getElementById('f_name').value.trim();
            const phone = document.getElementById('f_phone').value.trim();
            const address = document.getElementById('f_address').value.trim();
            const product = document.getElementById('f_product').value.trim();
            const quantity = document.getElementById('f_quantity').value.trim() || '1';
            const notes = document.getElementById('f_notes').value.trim();
            const errorDiv = document.getElementById('shipError');

            if (!name || !phone || !address || !product) {
                errorDiv.textContent = '⚠️ يرجى ملء الحقول المطلوبة (*)';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!currentUser) {
                errorDiv.textContent = '⚠️ يرجى تسجيل الدخول أولاً';
                errorDiv.classList.remove('hidden');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', 'addShipment');
            formData.append('phone', currentUser.phone);
            formData.append('password', currentUser.password);
            formData.append('customerName', name);
            formData.append('customerPhone', phone);
            formData.append('customerAddress', address);
            formData.append('productName', product);
            formData.append('productQuantity', quantity);
            formData.append('notes', notes);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    closeModal();
                    loadMyShipments();
                    alert('✅ تم إضافة الشحنة بنجاح!');
                } else {
                    errorDiv.textContent = data.msg || '❌ فشل الإضافة';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = '⚠️ فشل الاتصال بالخادم';
                errorDiv.classList.remove('hidden');
            }
        }

        // ============================================================
        //  إضافة رقم تتبع (للأدمن)
        // ============================================================
        function showAddTracking(shipmentId) {
            openModal(`
                <div class="modal-title">🔢 إضافة رقم تتبع</div>
                <p style="margin-bottom:12px;color:#666;">رقم الشحنة: <strong>${shipmentId}</strong></p>
                <div class="form-group"><label>🚚 رقم التتبع</label><input id="trackingNum" placeholder="مثال: JEG000470355620" dir="ltr"></div>
                <button class="submit-btn green" onclick="submitTracking('${shipmentId}')">💾 حفظ رقم التتبع</button>
                <div id="trackError" class="error-msg hidden"></div>
            `);
        }

        async function submitTracking(shipmentId) {
            const trackingNumber = document.getElementById('trackingNum').value.trim();
            const errorDiv = document.getElementById('trackError');

            if (!trackingNumber) {
                errorDiv.textContent = '⚠️ يرجى إدخال رقم التتبع';
                errorDiv.classList.remove('hidden');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', 'addTrackingNumber');
            formData.append('adminPhone', currentUser.phone);
            formData.append('adminPassword', currentUser.password);
            formData.append('shipmentId', shipmentId);
            formData.append('trackingNumber', trackingNumber);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    closeModal();
                    loadAllShipments();
                    alert('✅ تم إضافة رقم التتبع بنجاح!');
                } else {
                    errorDiv.textContent = data.msg || '❌ فشل الحفظ';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = '⚠️ فشل الاتصال بالخادم';
                errorDiv.classList.remove('hidden');
            }
        }

        // ============================================================
        //  حذف شحنة (للأدمن)
        // ============================================================
        async function deleteShipment(shipmentId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الشحنة؟')) return;

            const formData = new URLSearchParams();
            formData.append('action', 'deleteShipment');
            formData.append('adminPhone', currentUser.phone);
            formData.append('adminPassword', currentUser.password);
            formData.append('shipmentId', shipmentId);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    loadAllShipments();
                    alert('✅ تم حذف الشحنة بنجاح');
                } else {
                    alert(data.msg || '❌ فشل الحذف');
                }
            } catch (e) {
                alert('⚠️ فشل الاتصال بالخادم');
            }
        }

        // ============================================================
        //  تتبع الشحنة (عبر API الخارجي)
        // ============================================================
        async function trackShipment(billCode) {
            openModal(`
                <div class="modal-title">🚚 تتبع الشحنة</div>
                <div class="loading"><div class="spinner"></div><div>جاري التتبع...</div></div>
            `);

            try {
                const res = await fetch(`${API_URL}?action=track&billCode=${billCode}`);
                const data = await res.json();

                if (data.code === "1" && data.data && data.data[0]) {
                    let html = `<div class="modal-title">🚚 مسار الشحنة: ${billCode}</div>`;
                    const details = data.data[0].details || [];
                    if (details.length === 0) {
                        html += `<p style="text-align:center;color:#999;padding:20px;">لا توجد تفاصيل تتبع متاحة</p>`;
                    } else {
                        details.forEach(d => {
                            html += `
                                <div class="timeline-item">
                                    <div class="time">🕐 ${d.scanTime || ''}</div>
                                    <div class="event">📌 ${d.desc || d.scanType || ''}</div>
                                    <div class="location">📍 ${d.scanNetworkName || ''} ${d.scanNetworkCity ? '- ' + d.scanNetworkCity : ''}</div>
                                    ${d.probleDescription ? `<div class="problem">⚠️ ${d.probleDescription}</div>` : ''}
                                </div>
                            `;
                        });
                    }
                    document.getElementById('modalBody').innerHTML = html;
                } else {
                    document.getElementById('modalBody').innerHTML = `
                        <div class="modal-title">🚚 تتبع الشحنة</div>
                        <div style="text-align:center;padding:20px;color:#dc3545;">
                            <div style="font-size:48px;margin-bottom:12px;">❌</div>
                            <p>فشل تتبع الشحنة</p>
                            <p style="font-size:13px;color:#999;">رقم التتبع: ${billCode}</p>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('modalBody').innerHTML = `
                    <div class="modal-title">🚚 تتبع الشحنة</div>
                    <div style="text-align:center;padding:20px;color:#dc3545;">
                        <div style="font-size:48px;margin-bottom:12px;">📡</div>
                        <p>فشل الاتصال بخدمة التتبع</p>
                    </div>
                `;
            }
        }

        // ============================================================
        //  إدارة العملاء (للأدمن)
        // ============================================================
        async function showClients() {
            openModal(`
                <div class="modal-title">👥 إدارة العملاء</div>
                <button class="submit-btn green" onclick="showAddClientForm()" style="margin-bottom:14px;">➕ إنشاء حساب عميل جديد</button>
                <div id="clientList"><div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div></div>
            `);

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'allClients');
                formData.append('adminPhone', currentUser.phone);
                formData.append('adminPassword', currentUser.password);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                const listDiv = document.getElementById('clientList');
                if (data.success) {
                    if (data.clients.length === 0) {
                        listDiv.innerHTML = `<p style="text-align:center;color:#999;padding:20px;">لا يوجد عملاء حتى الآن</p>`;
                    } else {
                        let html = '';
                        data.clients.forEach(c => {
                            html += `
                                <div class="client-card">
                                    <div class="client-info">
                                        <div class="name">${c.name || 'غير معروف'}</div>
                                        <div class="phone">📱 ${c.phone || ''}</div>
                                        <div class="created">📅 ${c.created || ''}</div>
                                    </div>
                                    <div class="client-actions">
                                        <button onclick="deleteClient('${c.phone}')">🗑️ حذف</button>
                                    </div>
                                </div>
                            `;
                        });
                        listDiv.innerHTML = html;
                    }
                } else {
                    listDiv.innerHTML = `<p style="color:#dc3545;">${data.msg || 'فشل التحميل'}</p>`;
                }
            } catch (e) {
                document.getElementById('clientList').innerHTML = `<p style="color:#dc3545;">⚠️ فشل الاتصال بالخادم</p>`;
            }
        }

        function showAddClientForm() {
            openModal(`
                <div class="modal-title">➕ إنشاء حساب عميل جديد</div>
                <div class="form-group"><label>👤 اسم العميل *</label><input id="nc_name" placeholder="الاسم الكامل"></div>
                <div class="form-group"><label>📱 رقم الهاتف *</label><input id="nc_phone" placeholder="مثال: 011xxxxxxxx" dir="ltr"></div>
                <div class="form-group"><label>🔒 كلمة المرور *</label><input id="nc_password" type="password" placeholder="كلمة المرور للدخول" dir="ltr"></div>
                <button class="submit-btn green" onclick="createClient()">✅ إنشاء الحساب</button>
                <button class="submit-btn gray" onclick="showClients()" style="margin-top:8px;">↩️ رجوع</button>
                <div id="clientError" class="error-msg hidden"></div>
            `);
        }

        async function createClient() {
            const name = document.getElementById('nc_name').value.trim();
            const phone = document.getElementById('nc_phone').value.trim();
            const password = document.getElementById('nc_password').value.trim();
            const errorDiv = document.getElementById('clientError');

            if (!name || !phone || !password) {
                errorDiv.textContent = '⚠️ يرجى ملء جميع الحقول';
                errorDiv.classList.remove('hidden');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', 'createClient');
            formData.append('adminPhone', currentUser.phone);
            formData.append('adminPassword', currentUser.password);
            formData.append('clientName', name);
            formData.append('clientPhone', phone);
            formData.append('clientPassword', password);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    showClients();
                    alert('✅ تم إنشاء الحساب بنجاح!');
                } else {
                    errorDiv.textContent = data.msg || '❌ فشل الإنشاء';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = '⚠️ فشل الاتصال بالخادم';
                errorDiv.classList.remove('hidden');
            }
        }

        async function deleteClient(phone) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا العميل؟')) return;

            const formData = new URLSearchParams();
            formData.append('action', 'deleteClient');
            formData.append('phone', phone);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    showClients();
                    alert('✅ تم حذف العميل بنجاح');
                } else {
                    alert(data.msg || '❌ فشل الحذف');
                }
            } catch (e) {
                alert('⚠️ فشل الاتصال بالخادم');
            }
        }

        // ============================================================
        //  دوال المودال
        // ============================================================
        function openModal(html) {
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ============================================================
        //  اختصارات لوحة المفاتيح
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter') {
                if (!document.getElementById('dashboard').classList.contains('hidden')) return;
                doLogin();
            }
        });
    </script>

</body>
