<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تتبع وإدارة شحنات J&T Express</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e60012, #cc0000);
            min-height: 100vh;
            padding: 20px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(230, 0, 18, 0.03), transparent 70%);
            pointer-events: none;
        }
        .hidden {
            display: none !important;
        }

        /* ===== صفحة تسجيل الدخول ===== */
        .login-page {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .login-page .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .login-page .logo-node {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #131c2e, #080d16);
            border: 3px solid rgba(230, 0, 18, 0.5);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 900;
            color: white;
            position: relative;
            animation: nodeFloat 2.6s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(230, 0, 18, 0.2);
        }
        .login-page .logo-node::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px dashed #e60012;
            border-radius: 24px;
            opacity: 0.5;
            animation: rotateDashed 15s linear infinite;
        }
        @keyframes nodeFloat {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 25px rgba(230, 0, 18, 0.2); }
            50% { transform: translateY(-12px); box-shadow: 0 0 50px rgba(230, 0, 18, 0.5); }
        }
        @keyframes rotateDashed {
            100% { transform: rotate(360deg); }
        }

        .login-page h1 {
            color: #e60012;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .login-page .sub-title {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .login-page input {
            display: block;
            width: 100%;
            padding: 15px 18px;
            margin: 12px 0;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            transition: 0.3s;
            background: #fafafa;
        }
        .login-page input:focus {
            border-color: #e60012;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(230, 0, 18, 0.08);
        }
        .login-page button {
            width: 100%;
            padding: 16px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(230, 0, 18, 0.35);
            margin-top: 8px;
        }
        .login-page button:active {
            transform: scale(0.97);
            background: #cc0010;
        }
        .login-page .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 14px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 8px;
        }

        /* ===== الهيدر ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        .header h2 {
            color: #333;
            font-weight: 700;
            font-size: 20px;
        }
        .header h2 i {
            color: #e60012;
            margin-left: 8px;
        }
        .header .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .header .header-actions button {
            padding: 10px 16px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(230, 0, 18, 0.25);
        }
        .header .header-actions button:active {
            transform: scale(0.95);
        }
        .header .header-actions button.green {
            background: #28a745;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.25);
        }
        .header .header-actions button.blue {
            background: #0066cc;
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.25);
        }
        .header .header-actions button.orange {
            background: #ff9800;
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.25);
        }

        /* ===== ملخص ===== */
        .summary-box {
            background: #f8f8f8;
            padding: 15px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #eee;
            position: relative;
            z-index: 1;
        }
        .summary-box div {
            font-size: 14px;
            padding: 5px 10px;
        }
        .summary-box .count {
            font-size: 28px;
            font-weight: 900;
            color: #e60012;
        }
        .summary-box .label {
            color: #888;
            font-size: 12px;
            display: block;
        }

        /* ===== بطاقة الشحنة ===== */
        .shipment-card {
            background: #fafafa;
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 14px;
            border: 1px solid #eee;
            position: relative;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .shipment-card:hover {
            background: #f5f5f5;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }
        .shipment-card .status-badge {
            position: absolute;
            top: 14px;
            left: 18px;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-waiting {
            background: #fff3cd;
            color: #856404;
        }
        .status-tracking {
            background: #d1ecf1;
            color: #0c5460;
        }
        .status-done {
            background: #d4edda;
            color: #155724;
        }

        .shipment-card .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .shipment-card .summary-row .main-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .shipment-card .summary-row .main-info .name {
            font-weight: 700;
            font-size: 16px;
            color: #222;
        }
        .shipment-card .summary-row .main-info .phone {
            color: #555;
            direction: ltr;
            font-size: 14px;
        }
        .shipment-card .summary-row .main-info .amount {
            color: #e60012;
            font-weight: 700;
            font-size: 15px;
        }
        .shipment-card .summary-row .last-update {
            font-size: 12px;
            color: #888;
            direction: ltr;
            background: #f0f0f0;
            padding: 4px 14px;
            border-radius: 20px;
        }

        .shipment-card .details {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed #ddd;
            display: none;
        }
        .shipment-card .details.open {
            display: block;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shipment-card .details .info {
            margin: 5px 0;
            font-size: 13px;
            color: #555;
        }
        .shipment-card .details .info strong {
            color: #333;
            margin-left: 5px;
        }
        .shipment-card .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shipment-card .actions button {
            padding: 6px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }
        .shipment-card .actions button:active {
            transform: scale(0.95);
        }
        .btn-track {
            background: #0066cc;
            color: white;
        }
        .btn-track:hover {
            background: #0055aa;
        }
        .btn-add-tracking {
            background: #28a745;
            color: white;
        }
        .btn-add-tracking:hover {
            background: #1e7e34;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .btn-delete:hover {
            background: #b02a37;
        }

        /* ===== المودال ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 28px 25px 25px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-content h3 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #222;
        }
        .modal-content h3 i {
            color: #e60012;
            margin-left: 8px;
        }
        .close-btn {
            position: absolute;
            top: 16px;
            left: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
            transition: 0.2s;
        }
        .close-btn:hover {
            color: #333;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 16px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: #333;
            font-size: 14px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            background: #fafafa;
            transition: 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #e60012;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(230, 0, 18, 0.06);
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }

        .modal-content .submit-btn {
            width: 100%;
            padding: 14px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            box-shadow: 0 4px 16px rgba(230, 0, 18, 0.3);
            margin-top: 4px;
        }
        .modal-content .submit-btn:active {
            transform: scale(0.97);
            background: #cc0010;
        }
        .modal-content .submit-btn.green {
            background: #28a745;
            box-shadow: 0 4px 16px rgba(40, 167, 69, 0.3);
        }

        /* ===== التتبع ===== */
        .timeline-item {
            border-right: 3px solid #e60012;
            padding: 12px 16px 12px 0;
            margin-right: 10px;
            margin-bottom: 14px;
            background: #fafafa;
            border-radius: 0 10px 10px 0;
            transition: 0.2s;
        }
        .timeline-item:hover {
            background: #f5f0f0;
        }
        .timeline-item .time {
            color: #999;
            font-size: 13px;
        }
        .timeline-item .event {
            font-weight: 700;
            color: #333;
            margin: 5px 0;
        }
        .timeline-item .location {
            color: #666;
            font-size: 14px;
        }

        /* ===== العملاء ===== */
        .client-card {
            background: #fafafa;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
            transition: 0.2s;
        }
        .client-card:hover {
            background: #f5f5f5;
        }
        .client-card .client-info {
            flex: 1;
        }
        .client-card .client-info strong {
            font-size: 16px;
            color: #222;
        }
        .client-card .client-info .phone {
            color: #666;
            font-size: 14px;
            direction: ltr;
        }
        .client-card .client-info .created {
            font-size: 12px;
            color: #aaa;
        }
        .client-card .client-actions button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }
        .client-card .client-actions button:active {
            transform: scale(0.95);
        }

        /* ===== أخرى ===== */
        .loading {
            text-align: center;
            padding: 30px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e60012;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .empty-state button {
            margin-top: 12px;
            padding: 10px 30px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 12px rgba(230, 0, 18, 0.3);
            transition: 0.2s;
        }
        .empty-state button:active {
            transform: scale(0.95);
        }

        .error-box {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            color: #d32f2f;
        }
        .error-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        .error-box .title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .error-box .sub {
            font-size: 13px;
            color: #666;
        }
        .error-box button {
            margin-top: 12px;
            padding: 8px 24px;
            background: #e60012;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }
        .error-box button:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 28px;
            border-radius: 14px;
            font-size: 14px;
            z-index: 9999;
            animation: toastIn 0.3s ease;
            max-width: 90%;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .two-columns .form-group {
            margin-bottom: 0;
        }
        @media (max-width: 500px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }

        .debug-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            border: 1px dashed #ddd;
            word-break: break-all;
            text-align: left;
            direction: ltr;
            max-height: 150px;
            overflow: auto;
        }

        /* ===== موجة ===== */
        .wave-divider {
            width: 100%;
            overflow: hidden;
            line-height: 0;
            margin-top: 20px;
        }
        .wave-divider svg {
            display: block;
            width: calc(100% + 1.3px);
            height: 60px;
        }
        .wave-fill { fill: #f8f8f8; }

        /* ===== إضافات ===== */
        .glow-text {
            color: #e60012;
        }
        .text-center {
            text-align: center;
        }
        .mt-10 { margin-top: 10px; }
        .mb-10 { margin-bottom: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container" id="app">

    <!-- ===== صفحة تسجيل الدخول ===== -->
    <div id="loginPage" class="login-page">
        <div class="logo-wrapper">
            <div class="logo-node">📦</div>
        </div>
        <h1>نظام تتبع شحنات <span class="glow-text">J&T</span></h1>
        <p class="sub-title">إدارة الشحنات بكل سهولة واحترافية</p>
        <input type="text" id="phoneInput" placeholder="📱 رقم الهاتف" dir="ltr">
        <input type="password" id="passwordInput" placeholder="🔒 كلمة المرور" dir="ltr">
        <button onclick="doLogin()">🚀 دخول</button>
        <p class="error-msg" id="loginError"></p>

        <div class="wave-divider">
            <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V0C26.9,4.75,55.05,16.33,81.11,25.09,151,48.56,224.4,74.48,321.39,56.44Z" class="wave-fill"></path>
            </svg>
        </div>
    </div>

    <!-- ===== لوحة التحكم ===== -->
    <div id="dashboard" class="hidden">
        <div class="header">
            <h2><i class="fas fa-tachometer-alt"></i> <span id="welcomeMsg">مرحباً</span></h2>
            <div class="header-actions">
                <button id="addShipmentBtn" class="green hidden" onclick="showAddShipmentForm()">➕ إضافة شحنة</button>
                <button id="clientsBtn" class="blue hidden" onclick="showClients()">👥 عملاء</button>
                <button id="allShipmentsBtn" class="orange hidden" onclick="loadAllShipments()">📋 الكل</button>
                <button onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div id="summaryBox" class="summary-box hidden">
            <div><span class="count" id="totalCount">0</span><span class="label">كل الشحنات</span></div>
            <div><span class="count" id="waitingCount" style="color:#856404;">0</span><span class="label">قيد الانتظار</span></div>
            <div><span class="count" id="trackingCount" style="color:#0c5460;">0</span><span class="label">قيد التتبع</span></div>
            <div><span class="count" id="doneCount" style="color:#155724;">0</span><span class="label">تم التوصيل</span></div>
        </div>

        <div id="content"></div>
    </div>
</div>

<!-- ===== مودال ===== -->
<div id="modal" class="modal hidden">
    <div class="modal-content" id="modalContent">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // ============================================================
    //  🔗 الرابط الجديد
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbycDitGXHkdifuWiGLldREr33T-8gQ4RJ9v4_v0fgECXz1FsUSsaDxADPsaBUHw2AtR/exec";
    let currentUser = null;

    // ============================================================
    //  قائمة المحافظات والمدن

    function updateCities() {

        citySelect.innerHTML = '<option value="">اختر المدينة</option>';

    // ============================================================
    //  🔐 تسجيل الدخول
    // ============================================================
    async function doLogin() {
        const phone = document.getElementById('phoneInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        const errorDiv = document.getElementById('loginError');
        if (!phone || !password) { errorDiv.textContent = "يرجى إدخال رقم الهاتف وكلمة المرور"; return; }
        try {
            const res = await fetch(`${API_URL}?action=login&phone=${phone}&password=${password}`);
            const data = await res.json();
            if (data.success) { 
                currentUser = { phone, password, name: data.name, role: data.role };
                showDashboard(); 
            } else { 
                errorDiv.textContent = data.msg || "فشل تسجيل الدخول"; 
            }
        } catch (e) { errorDiv.textContent = "فشل الاتصال"; }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('phoneInput').value = '';
        document.getElementById('passwordInput').value = '';
        showToast('🚪 تم تسجيل الخروج', '');
    }

    function showDashboard() {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        const isAdmin = currentUser.role === 'admin';
        document.getElementById('welcomeMsg').textContent = `مرحباً ${currentUser.name} (${isAdmin ? 'أدمن' : 'عميل'})`;
        
        document.getElementById('addShipmentBtn').classList.toggle('hidden', isAdmin);
        document.getElementById('clientsBtn').classList.toggle('hidden', !isAdmin);
        document.getElementById('allShipmentsBtn').classList.toggle('hidden', !isAdmin);
        document.getElementById('summaryBox').classList.toggle('hidden', !isAdmin);

        if (isAdmin) {
            loadAllShipments();
        } else {
            loadMyShipments();
        }
    }

    // ============================================================
    //  📦 تحميل الشحنات
    // ============================================================
    async function loadMyShipments() {
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
        try {
            const res = await fetch(`${API_URL}?action=myShipments&phone=${currentUser.phone}&password=${currentUser.password}`);
            const data = await res.json();
            if (data.success) {
                content.innerHTML = data.shipments.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>لا توجد شحنات حتى الآن</p></div>' : data.shipments.map(s => createShipmentCard(s)).join('');
            } else { content.innerHTML = '<p style="color:red;">' + (data.msg || 'فشل التحميل') + '</p>'; }
        } catch (e) { content.innerHTML = '<p style="color:red;">فشل الاتصال</p>'; }
    }

    async function loadAllShipments() {
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
        try {
            const params = new URLSearchParams();
            params.append('action', 'allShipments');
            params.append('adminPhone', currentUser.phone);
            params.append('adminPassword', currentUser.password);
            const res = await fetch(API_URL, { method: 'POST', body: params });
            const data = await res.json();
            if (data.success) {
                updateSummary(data.shipments);
                content.innerHTML = data.shipments.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>لا توجد شحنات</p></div>' : data.shipments.map(s => createShipmentCard(s, true)).join('');
            } else { content.innerHTML = '<p style="color:red;">' + (data.msg || 'فشل التحميل') + '</p>'; }
        } catch (e) { content.innerHTML = '<p style="color:red;">فشل الاتصال</p>'; }
    }

    function updateSummary(shipments) {
        const waiting = shipments.filter(s => s.status && s.status.includes('انتظار')).length;
        const tracking = shipments.filter(s => s.status && s.status.includes('تتبع')).length;
        const delivered = shipments.filter(s => s.status && s.status.includes('تم')).length;
        document.getElementById('totalCount').textContent = shipments.length;
        document.getElementById('waitingCount').textContent = waiting;
        document.getElementById('trackingCount').textContent = tracking;
        document.getElementById('doneCount').textContent = delivered;
    }

    // ============================================================
    //  🎨 عرض بطاقة الشحنة
    // ============================================================
    function createShipmentCard(s, isAdmin = false) {
        let statusClass = 'status-waiting';
        let statusText = s.status || 'في انتظار التتبع';
        if (statusText.includes('تتبع')) statusClass = 'status-tracking';
        else if (statusText.includes('تم')) statusClass = 'status-done';

        let lastUpdate = s.lastUpdate || s.date || '';
        let updateText = lastUpdate ? 'آخر تحديث: ' + lastUpdate : '';

        let actions = '';
        const trackingNum = s.trackingNumber || '';
        if (trackingNum && trackingNum.length > 3) {
            actions += `<button class="btn-track" onclick="event.stopPropagation(); trackShipment('${trackingNum}')">📍 تتبع</button>`;
        }
        if (isAdmin) {
            if (!trackingNum || trackingNum.length < 3) {
                actions += `<button class="btn-add-tracking" onclick="event.stopPropagation(); showAddTracking('${s.id}')">🔢 إضافة تتبع</button>`;
            }
            actions += `<button class="btn-delete" onclick="event.stopPropagation(); deleteShipment('${s.id}')">🗑️ حذف</button>`;
        }

        const displayName = s.receiverName || s.customerName || 'غير معروف';
        const displayPhone = s.receiverPhone || s.customerPhone || '';
        const displayAmount = s.amount || '0';

        return `<div class="shipment-card" onclick="toggleDetails(this)">
            <span class="status-badge ${statusClass}">${statusText}</span>
            <div class="summary-row">
                <div class="main-info">
                    <span class="name">👤 ${displayName}</span>
                    <span class="phone">📱 ${displayPhone}</span>
                    <span class="amount">💰 ${displayAmount} ج.م</span>
                </div>
                <div class="last-update">${updateText}</div>
            </div>
            <div class="details">
                ${isAdmin ? `<div class="info"><strong>📱 رقم العميل:</strong> ${s.clientPhone || 'غير معروف'}</div>` : ''}
                <div class="info"><strong>🔢 رقم الشحنة:</strong> ${s.id}</div>
                ${trackingNum ? `<div class="info"><strong>🚚 رقم التتبع:</strong> ${trackingNum}</div>` : ''}
                ${s.receiverPhone2 ? `<div class="info"><strong>📱 هاتف آخر:</strong> ${s.receiverPhone2}</div>` : ''}
                ${s.governorate ? `<div class="info"><strong>📍 المحافظة:</strong> ${s.governorate}</div>` : ''}
                ${s.city ? `<div class="info"><strong>🏙️ المدينة:</strong> ${s.city}</div>` : ''}
                <div class="info"><strong>📍 العنوان:</strong> ${s.address || s.customerAddress || ''}</div>
                ${s.weight ? `<div class="info"><strong>⚖️ الوزن:</strong> ${s.weight} كجم</div>` : ''}
                ${s.notes ? `<div class="info"><strong>📝 ملاحظات:</strong> ${s.notes}</div>` : ''}
                ${actions ? `<div class="actions">${actions}</div>` : ''}
            </div>
        </div>`;
    }

    function toggleDetails(element) {
        const details = element.querySelector('.details');
        if (details) {
            details.classList.toggle('open');
        }
    }

    async function submitShipment() {
        const receiverName = document.getElementById('f_receiverName').value.trim();
        const receiverPhone = document.getElementById('f_receiverPhone').value.trim();
        const receiverPhone2 = document.getElementById('f_receiverPhone2').value.trim();
        const governorate = document.getElementById('f_governorate').value;
        const city = document.getElementById('f_city').value;
        const address = document.getElementById('f_address').value.trim();
        const amount = document.getElementById('f_amount').value.trim();
        const weight = document.getElementById('f_weight').value.trim() || '1';
        const notes = document.getElementById('f_notes').value.trim();
        const errorDiv = document.getElementById('shipError');

        if (!receiverName || !receiverPhone || !governorate || !city || !address || !amount) {
            errorDiv.textContent = "يرجى ملء جميع الحقول المطلوبة (*)";
            return;
        }

        const params = new URLSearchParams();
        params.append('action', 'addShipment');
        params.append('phone', currentUser.phone);
        params.append('password', currentUser.password);
        params.append('receiverName', receiverName);
        params.append('receiverPhone', receiverPhone);
        params.append('receiverPhone2', receiverPhone2);
        params.append('governorate', governorate);
        params.append('city', city);
        params.append('address', address);
        params.append('amount', amount);
        params.append('weight', weight);
        params.append('notes', notes);

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            const data = await res.json();
            if (data.success) { 
                closeModal(); 
                loadMyShipments(); 
                showToast('✅ تم إضافة الشحنة بنجاح!', 'success');
            } else { 
                errorDiv.textContent = data.msg || "فشل الإضافة"; 
            }
        } catch (e) { 
            errorDiv.textContent = 'فشل الاتصال'; 
        }
    }

    // ============================================================
    //  🚚 تتبع الشحنة
    // ============================================================
    async function trackShipment(billCode) {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modalBody').innerHTML = '<div class="loading"><div class="spinner"></div>جاري تتبع الشحنة...</div>';
        
        try {
            const res = await fetch(`${API_URL}?action=track&billCode=${billCode}`);
            const data = await res.json();
            console.log('📡 Track response:', data);

            if (data.code === "1" && data.data && data.data[0]) {
                let html = `<h3><i class="fas fa-map-marked-alt"></i> مسار الشحنة: ${billCode}</h3>`;
                const details = data.data[0].details || [];
                if (details.length === 0) {
                    html += `<p style="text-align:center;color:#999;padding:20px;">لا توجد تفاصيل تتبع متاحة</p>`;
                } else {
                    details.forEach(d => {
                        html += `<div class="timeline-item">
                            <div class="time">🕐 ${d.scanTime || ''}</div>
                            <div class="event">📌 ${d.desc || d.scanType || ''}</div>
                            <div class="location">📍 ${d.scanNetworkName || ''} ${d.scanNetworkCity ? '- ' + d.scanNetworkCity : ''}</div>
                            ${d.probleDescription ? `<div style="color:red;margin-top:5px;">⚠️ ${d.probleDescription}</div>` : ''}
                        </div>`;
                    });
                }
                document.getElementById('modalBody').innerHTML = html;
            } else {
                let errorMsg = data.msg || data.error || 'فشل تتبع الشحنة';
                document.getElementById('modalBody').innerHTML = `
                    <h3><i class="fas fa-map-marked-alt"></i> تتبع الشحنة</h3>
                    <div style="text-align:center;padding:20px;color:#dc3545;">
                        <div style="font-size:48px;margin-bottom:12px;">❌</div>
                        <p>${errorMsg}</p>
                        <p style="font-size:13px;color:#999;">رقم التتبع: ${billCode}</p>
                        <div class="debug-box">${JSON.stringify(data, null, 2)}</div>
                    </div>
                `;
            }
        } catch (e) {
            document.getElementById('modalBody').innerHTML = `
                <h3><i class="fas fa-map-marked-alt"></i> تتبع الشحنة</h3>
                <div style="text-align:center;padding:20px;color:#dc3545;">
                    <div style="font-size:48px;margin-bottom:12px;">📡</div>
                    <p>فشل الاتصال بخدمة التتبع</p>
                    <p style="font-size:13px;color:#999;">${e.message}</p>
                </div>
            `;
        }
    }

    // ============================================================
    //  👥 إدارة العملاء (للأدمن)
    // ============================================================
    async function showClients() {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modalBody').innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
        
        try {
            const params = new URLSearchParams();
            params.append('action', 'allClients');
            params.append('adminPhone', currentUser.phone);
            params.append('adminPassword', currentUser.password);

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            const data = await res.json();
            
            if (data.success) {
                let html = `<h3><i class="fas fa-users"></i> إدارة العملاء</h3>
                    <button class="submit-btn green" onclick="showAddClientForm()" style="margin-bottom:14px;">➕ إنشاء حساب عميل جديد</button>
                    <div id="clientList"></div>`;
                document.getElementById('modalBody').innerHTML = html;
                
                const listDiv = document.getElementById('clientList');
                if (data.clients.length === 0) {
                    listDiv.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">لا يوجد عملاء حتى الآن</p>';
                } else {
                    data.clients.forEach(c => {
                        listDiv.innerHTML += `<div class="client-card">
                            <div class="client-info"><strong>${c.name}</strong><br><span class="phone">📱 ${c.phone}</span><br><span class="created">📅 ${c.created}</span></div>
                            <div class="client-actions"><button onclick="deleteClient('${c.phone}')">🗑️ حذف</button></div>
                        </div>`;
                    });
                }
            } else {
                document.getElementById('modalBody').innerHTML = `<p style="color:red;">${data.msg || 'فشل التحميل'}</p>`;
            }
        } catch (e) {
            document.getElementById('modalBody').innerHTML = `<p style="color:red;">فشل الاتصال</p>`;
        }
    }

    function showAddClientForm() {
        document.getElementById('modalBody').innerHTML = `
            <h3><i class="fas fa-user-plus"></i> إنشاء حساب عميل جديد</h3>
            <div class="form-group"><label>👤 اسم العميل *</label><input id="newClientName" placeholder="الاسم الكامل"></div>
            <div class="form-group"><label>📱 رقم الهاتف *</label><input id="newClientPhone" dir="ltr" placeholder="مثال: 011xxxxxxxx"></div>
            <div class="form-group"><label>🔒 كلمة المرور *</label><input id="newClientPassword" type="password" dir="ltr" placeholder="كلمة المرور للدخول"></div>
            <button class="submit-btn green" onclick="createClient()">✅ إنشاء الحساب</button>
            <button class="submit-btn" style="background:#999;box-shadow:none;margin-top:8px;" onclick="showClients()">↩️ رجوع</button>
            <p id="clientError" style="color:red;margin-top:10px;text-align:center;"></p>
        `;
    }

    async function createClient() {
        const name = document.getElementById('newClientName').value.trim();
        const phone = document.getElementById('newClientPhone').value.trim();
        const password = document.getElementById('newClientPassword').value.trim();
        const errorDiv = document.getElementById('clientError');
        if (!name || !phone || !password) { errorDiv.textContent = "يرجى ملء جميع الحقول"; return; }
        
        const params = new URLSearchParams();
        params.append('action', 'createClient');
        params.append('adminPhone', currentUser.phone);
        params.append('adminPassword', currentUser.password);
        params.append('clientName', name);
        params.append('clientPhone', phone);
        params.append('clientPassword', password);

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            const data = await res.json();
            if (data.success) { showClients(); showToast('✅ تم إنشاء الحساب!', 'success'); }
            else { errorDiv.textContent = data.msg; }
        } catch (e) { errorDiv.textContent = 'فشل الاتصال'; }
    }

    async function deleteClient(phone) {
        if (!confirm('هل أنت متأكد من حذف هذا العميل؟')) return;
        try {
            const params = new URLSearchParams();
            params.append('action', 'deleteClient');
            params.append('phone', phone);
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            showClients();
            showToast('✅ تم حذف العميل', 'success');
        } catch (e) { 
            showToast('⚠️ فشل الحذف', 'error');
        }
    }

    // ============================================================
    //  🖥️ دوال مساعدة
    // ============================================================
    function closeModal() { 
        document.getElementById('modal').classList.add('hidden'); 
    }

    function showToast(message, type) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast' + (type ? ' ' + type : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) { 
        if (e.key === 'Enter') doLogin(); 
    });
    document.getElementById('phoneInput').addEventListener('keypress', function(e) { 
        if (e.key === 'Enter') document.getElementById('passwordInput').focus(); 
    });

    // منع اختصارات النسخ
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'c' || e.key === 'a')) {
            e.preventDefault();
        }
        if (e.key === 'Escape') closeModal();
    });

    // بيانات تجريبية للاختبار
    document.getElementById('phoneInput').value = '01119024874';
    document.getElementById('passwordInput').value = '01119024874';
</script>
