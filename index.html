<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تتبع وإدارة شحنات J&T Express</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma; background: linear-gradient(135deg, #e60012, #cc0000); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
        .login-page { text-align: center; }
        .login-page .logo { font-size: 60px; margin-bottom: 20px; }
        .login-page h1 { color: #e60012; margin-bottom: 30px; }
        .login-page input { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        .login-page button { width: 100%; padding: 15px; background: #e60012; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .error-msg { color: red; margin-top: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #eee; flex-wrap: wrap; gap: 10px; }
        .header h2 { color: #333; }
        .header button { padding: 10px 15px; background: #e60012; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; margin: 2px; }
        .header button.green { background: #28a745; }
        .header button.blue { background: #0066cc; }
        .header button.orange { background: #ff9800; }
        .shipment-card { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; position: relative; }
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-tracking { background: #d1ecf1; color: #0c5460; }
        .status-done { background: #d4edda; color: #155724; }
        .shipment-card .info { margin: 8px 0; color: #555; }
        .shipment-card .info strong { color: #333; margin-left: 5px; }
        .shipment-card .actions { margin-top: 15px; }
        .shipment-card .actions button { padding: 8px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-track { background: #0066cc; color: white; }
        .btn-add-tracking { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group textarea { height: 80px; resize: vertical; }
        .timeline-item { border-right: 3px solid #e60012; padding: 12px 15px; margin-right: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 0 8px 8px 0; }
        .timeline-item .time { color: #999; font-size: 13px; }
        .timeline-item .event { font-weight: bold; color: #333; margin: 5px 0; }
        .timeline-item .location { color: #666; font-size: 14px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 15px; padding: 25px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 20px; text-align: center; }
        .close-btn { float: left; cursor: pointer; font-size: 24px; color: #999; }
        .loading { text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e60012; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .summary-box { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center; flex-wrap: wrap; }
        .summary-box div { font-size: 14px; padding: 5px; }
        .summary-box .count { font-size: 28px; font-weight: bold; color: #e60012; }
        .client-card { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .client-info { flex: 1; }
        .client-actions button { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .two-columns .form-group { margin-bottom: 10px; }
        @media (max-width: 500px) { .two-columns { grid-template-columns: 1fr; } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 9999; animation: toastIn 0.3s ease; max-width: 90%; text-align: center; }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .debug-box { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 11px; color: #666; border: 1px dashed #ddd; word-break: break-all; text-align: left; direction: ltr; max-height: 150px; overflow: auto; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="loginPage" class="login-page">
            <div class="logo">📦</div>
            <h1>نظام تتبع شحنات J&T</h1>
            <input type="text" id="phoneInput" placeholder="رقم الهاتف" dir="ltr">
            <input type="password" id="passwordInput" placeholder="كلمة المرور" dir="ltr">
            <button onclick="doLogin()">دخول</button>
            <p class="error-msg" id="loginError"></p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="header">
                <h2 id="welcomeMsg">مرحباً</h2>
                <div>
                    <button id="addShipmentBtn" class="green hidden" onclick="showAddShipmentForm()">➕ إضافة شحنة</button>
                    <button id="clientsBtn" class="blue hidden" onclick="showClients()">👥 إدارة العملاء</button>
                    <button id="allShipmentsBtn" class="orange hidden" onclick="loadAllShipments()">📋 جميع الشحنات</button>
                    <button onclick="logout()">🚪 خروج</button>
                </div>
            </div>
            <div id="summaryBox" class="summary-box hidden"></div>
            <div id="content"></div>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ============================================================
        //  🔗 الرابط الجديد
        // ============================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbycDitGXHkdifuWiGLldREr33T-8gQ4RJ9v4_v0fgECXz1FsUSsaDxADPsaBUHw2AtR/exec";
        let currentUser = null;

        // ============================================================
        //  قائمة المحافظات والمدن
        // ============================================================
        const governorates = {
            'الشرقية': ['بلبيس', 'انشاص الرمل', 'أولاد صقر', 'الحسينية', 'ديرب نجم', 'فاقوس', 'كفر صقر', 'مشتول السوق', 'منيا القمح', 'الصالحية القديمة', 'الصالحية الجديدة', 'صان الحجر', 'مدينة العاشر من رمضان'],
            'الجيزة': ['مدينة السادس من أكتوبر', 'مدينة الشيخ زايد', 'العياط', 'الحوامدية', 'البدرشين', 'الصف', 'العمرانية', 'أطفيح', 'الواحات البحرية', 'الجيزة', 'حدائق الاهرام', 'فيصل', 'الهرم', 'أبو النمرس', 'العجوزة', 'الوراق', 'أوسيم', 'بولاق الدكرور', 'الدقي', 'أرض اللواء', 'المهندسين', 'كرداسة', 'إمبابة', 'منشأة القناطر'],
            'الغربية': ['كفر الزيات', 'المحلة الكبرى', 'سمنود', 'بسيون', 'السنطة', 'زفتى', 'قطور', 'طنطا'],
            'الدقهلية': ['المنصورة', 'أجا', 'المنزلة', 'بلقاس', 'دكرنس', 'السنبلاوين', 'منية النصر', 'ميت غمر', 'شربين', 'طلخا'],
            'الإسكندرية': ['الدخيلة', 'العامرية', 'برج العرب', 'محرم بيك', 'باب شرقي', 'الساحل الشمالي', 'سيدي جابر', 'العطارين', 'المنشية', 'اللبان', 'الجمرك', 'مينا البصل', 'كرموز', 'الرمل', 'المنتزه'],
            'أسيوط': ['أبنوب', 'أبوتيج', 'البداري', 'الغنايم', 'الفتح', 'القوصية', 'ديروط', 'ساحل سليم', 'صدفا', 'مدينة أسيوط', 'منفلوط', 'منقباد'],
            'أسوان': ['أسوان', 'كوم امبو', 'دراو', 'إدفو'],
            'بني سويف': ['الواسطى', 'ناصر', 'مدينة بني سويف', 'مركز بني سويف', 'أهناسيا', 'ببا', 'سمسطا', 'الفشن'],
            'القليوبية': ['بنها', 'الخانكة', 'العبور', 'القناطر الخيرية', 'شبين القناطر', 'طوخ', 'كفر شكر', 'قليوب', 'شبرا الخيمة'],
            'القاهرة': ['عابدين', 'العباسية', 'الأزبكية', 'القطامية', 'المنيل', 'المقطم', 'دار السلام', 'البساتين', 'الجمالية', 'السيدة زينب', 'حلوان', 'المعادي', 'مصر القديمة', 'قصر النيل', 'الخليفة', 'طرة', 'الزمالك', 'الشروق', 'مدينة بدر', 'عين شمس', 'مدينتي', 'الزيتون', 'مدينة نصر', 'القاهرة الجديدة', 'هليوبوليس', 'الأميرية', 'السلام', 'الوايلي', 'الشرابية', 'المرج', 'المطرية', 'النزهة', 'حدائق القبة', 'شبرا مصر', 'كورنيش النيل'],
            'البحيرة': ['دمنهور', 'كفر الدوار', 'أبو حمص', 'المحمودية', 'وادي النطرون', 'النوبارية', 'أبوالمطامير', 'حوش عيسي', 'إيتاي البارود', 'شبراخيت', 'رشيد', 'إدكوا', 'مركز بدر', 'الدلنجات', 'الرحمانية', 'كوم حمادة'],
            'دمياط': ['فارسكور', 'دمياط القديمة', 'كفر سعد', 'الزرقا', 'كفر البطيخ', 'دمياط الجديدة', 'رأس البر', 'عزبة البرج'],
            'الفيوم': ['طامية', 'سنورس', 'مركز الفيوم', 'مدينة الفيوم', 'أطسا', 'أبشواي', 'يوسف الصديق'],
            'البحر الأحمر': ['الغردقة', 'رأس غارب', 'سفاجا', 'القصير', 'مرسى علم'],
            'الإسماعيلية': ['الإسماعيلية'],
            'كفر الشيخ': ['كفر الشيخ', 'دسوق', 'فوه', 'مطوبس', 'بلطيم', 'الحامول', 'الرياض', 'بيلا', 'قلين', 'سيدى سالم'],
            'الأقصر': ['مدينة الأقصر', 'أرمنت', 'أسنا', 'القرنة'],
            'مرسى مطروح': ['مرسى مطروح'],
            'المنيا': ['العدوة', 'مغاغة', 'بني مزار', 'مطاي', 'سمالوط', 'مركز المنيا', 'مدينة المنيا', 'أبو قرقاص', 'ملوي', 'دير مواس'],
            'بور سعيد': ['بورسعيد'],
            'قنا': ['قنا', 'قوص', 'مدينة قفط', 'دشنا', 'نقادة', 'نجع حمادي', 'فرشوط', 'أبوتشت'],
            'المنوفية': ['قويسنا', 'بركة السبع', 'السادات', 'الشهداء', 'تلا', 'شبين الكوم', 'الباجور', 'منوف', 'أشمون'],
            'سوهاج': ['طما', 'طهطا', 'جهينة', 'مدينة سوهاج', 'المراغة', 'أخميم', 'ساقلته', 'المنشأة', 'جرجا', 'البلينا', 'دار السلام', 'العسيرات'],
            'السويس': ['السويس'],
            'الوادي الجديد': ['الخارجة', 'الداخلة', 'الفرافرة'],
            'جنوب سيناء': ['جنوب سيناء', 'شرم الشيخ', 'دهب']
        };

        function updateCities() {
            const govSelect = document.getElementById('f_governorate');
            const citySelect = document.getElementById('f_city');
            const selected = govSelect.value;
            citySelect.innerHTML = '<option value="">اختر المدينة</option>';
            if (selected && governorates[selected]) {
                governorates[selected].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        // ============================================================
        //  🔐 تسجيل الدخول
        // ============================================================
        async function doLogin() {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('loginError');
            if (!phone || !password) { errorDiv.textContent = "يرجى إدخال رقم الهاتف وكلمة المرور"; return; }
            try {
                const res = await fetch(`${API_URL}?action=login&phone=${phone}&password=${password}`);
                const data = await res.json();
                if (data.success) { 
                    currentUser = { phone, password, name: data.name, role: data.role };
                    showDashboard(); 
                } else { 
                    errorDiv.textContent = data.msg || "فشل تسجيل الدخول"; 
                }
            } catch (e) { errorDiv.textContent = "فشل الاتصال"; }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('phoneInput').value = '';
            document.getElementById('passwordInput').value = '';
            showToast('🚪 تم تسجيل الخروج', '');
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            const isAdmin = currentUser.role === 'admin';
            document.getElementById('welcomeMsg').textContent = `مرحباً ${currentUser.name} (${isAdmin ? 'أدمن' : 'عميل'})`;
            
            document.getElementById('addShipmentBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('clientsBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('allShipmentsBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('summaryBox').classList.toggle('hidden', !isAdmin);

            if (isAdmin) {
                loadAllShipments();
            } else {
                loadMyShipments();
            }
        }

        // ============================================================
        //  📦 تحميل الشحنات
        // ============================================================
        async function loadMyShipments() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
            try {
                const res = await fetch(`${API_URL}?action=myShipments&phone=${currentUser.phone}&password=${currentUser.password}`);
                const data = await res.json();
                if (data.success) {
                    content.innerHTML = data.shipments.length === 0 ? '<p style="text-align:center;color:#999;padding:50px;">لا توجد شحنات حتى الآن</p>' : data.shipments.map(s => createShipmentCard(s)).join('');
                } else { content.innerHTML = '<p style="color:red;">' + (data.msg || 'فشل التحميل') + '</p>'; }
            } catch (e) { content.innerHTML = '<p style="color:red;">فشل الاتصال</p>'; }
        }

        async function loadAllShipments() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
            try {
                const params = new URLSearchParams();
                params.append('action', 'allShipments');
                params.append('adminPhone', currentUser.phone);
                params.append('adminPassword', currentUser.password);
                const res = await fetch(API_URL, { method: 'POST', body: params });
                const data = await res.json();
                if (data.success) {
                    updateSummary(data.shipments);
                    content.innerHTML = data.shipments.length === 0 ? '<p style="text-align:center;color:#999;padding:50px;">لا توجد شحنات</p>' : data.shipments.map(s => createShipmentCard(s, true)).join('');
                } else { content.innerHTML = '<p style="color:red;">' + (data.msg || 'فشل التحميل') + '</p>'; }
            } catch (e) { content.innerHTML = '<p style="color:red;">فشل الاتصال</p>'; }
        }

        function updateSummary(shipments) {
            const waiting = shipments.filter(s => s.status && s.status.includes('انتظار')).length;
            const tracking = shipments.filter(s => s.status && s.status.includes('تتبع')).length;
            const delivered = shipments.filter(s => s.status && s.status.includes('تم')).length;
            document.getElementById('summaryBox').innerHTML = `
                <div><div class="count">${shipments.length}</div>كل الشحنات</div>
                <div><div class="count" style="color:#856404;">${waiting}</div>قيد الانتظار</div>
                <div><div class="count" style="color:#0c5460;">${tracking}</div>قيد التتبع</div>
                <div><div class="count" style="color:#155724;">${delivered}</div>تم التوصيل</div>
            `;
        }

        // ============================================================
        //  🎨 عرض بطاقة الشحنة
        // ============================================================
        function createShipmentCard(s, isAdmin = false) {
            let statusClass = 'status-waiting';
            let statusText = s.status || 'في انتظار التتبع';
            if (statusText.includes('تتبع')) statusClass = 'status-tracking';
            else if (statusText.includes('تم')) statusClass = 'status-done';

            let actions = '';
            // استخدام trackingNumber من العمود A
            const trackingNum = s.trackingNumber || '';
            if (trackingNum && trackingNum.length > 3) {
                actions += `<button class="btn-track" onclick="trackShipment('${trackingNum}')">📍 تتبع</button>`;
            }
            if (isAdmin) {
                if (!trackingNum || trackingNum.length < 3) {
                    actions += `<button class="btn-add-tracking" onclick="showAddTracking('${s.id}')">🔢 إضافة رقم تتبع</button>`;
                }
                actions += `<button class="btn-delete" onclick="deleteShipment('${s.id}')">🗑️ حذف</button>`;
            }

            return `<div class="shipment-card"><span class="status-badge ${statusClass}">${statusText}</span>${isAdmin ? `<div class="info"><strong>📱 صاحب الشحنة:</strong> ${s.clientPhone || 'غير معروف'}</div>` : ''}<div class="info"><strong>🔢 رقم الشحنة:</strong> ${s.id}</div><div class="info"><strong>📅 التاريخ:</strong> ${s.date || ''}</div>${trackingNum ? `<div class="info"><strong>🚚 رقم التتبع:</strong> ${trackingNum}</div>` : ''}<div class="info"><strong>👤 المستلم:</strong> ${s.receiverName || ''}</div><div class="info"><strong>📱 هاتف المستلم:</strong> ${s.receiverPhone || ''}</div>${s.receiverPhone2 ? `<div class="info"><strong>📱 هاتف آخر:</strong> ${s.receiverPhone2}</div>` : ''}${s.governorate ? `<div class="info"><strong>📍 المحافظة:</strong> ${s.governorate}</div>` : ''}${s.city ? `<div class="info"><strong>🏙️ المدينة:</strong> ${s.city}</div>` : ''}<div class="info"><strong>📍 العنوان:</strong> ${s.address || ''}</div>${s.amount ? `<div class="info"><strong>💰 المبلغ:</strong> ${s.amount}</div>` : ''}${s.weight ? `<div class="info"><strong>⚖️ الوزن:</strong> ${s.weight}</div>` : ''}${s.notes ? `<div class="info"><strong>📝 ملاحظات:</strong> ${s.notes}</div>` : ''}<div class="actions">${actions}</div></div>`;
        }

        // ============================================================
        //  ➕ إضافة شحنة جديدة
        // ============================================================
        function showAddShipmentForm() {
            if (!currentUser) { showToast('⚠️ يرجى تسجيل الدخول أولاً', 'error'); return; }
            
            let govOptions = '<option value="">اختر المحافظة</option>';
            Object.keys(governorates).forEach(gov => {
                govOptions += `<option value="${gov}">${gov}</option>`;
            });

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = `
                <span class="close-btn" onclick="closeModal()">✖</span>
                <h3>📦 إضافة شحنة جديدة</h3>
                <div class="form-group"><label>👤 اسم المستلم *</label><input id="f_receiverName" placeholder="اسم المستلم"></div>
                <div class="form-group"><label>📱 هاتف المستلم *</label><input id="f_receiverPhone" placeholder="مثال: 010xxxxxxxx" dir="ltr"></div>
                <div class="form-group"><label>📱 هاتف آخر للمستلم</label><input id="f_receiverPhone2" placeholder="هاتف آخر (اختياري)" dir="ltr"></div>
                <div class="two-columns">
                    <div class="form-group"><label>🏛️ المحافظة *</label><select id="f_governorate" onchange="updateCities()">${govOptions}</select></div>
                    <div class="form-group"><label>🏙️ المدينة *</label><select id="f_city"><option value="">اختر المحافظة أولاً</option></select></div>
                </div>
                <div class="form-group"><label>📍 العنوان التفصيلي *</label><input id="f_address" placeholder="العنوان بالتفصيل"></div>
                <div class="form-group"><label>💰 المبلغ المطلوب تحصيله شامل الشحن *</label><input id="f_amount" type="number" placeholder="المبلغ بالجنيه" dir="ltr"></div>
                <div class="form-group"><label>⚖️ وزن الشحنة *</label><input id="f_weight" type="number" placeholder="الوزن بالكيلو" dir="ltr" value="1"></div>
                <div class="form-group"><label>📝 ملاحظات</label><textarea id="f_notes" placeholder="ملاحظات إضافية"></textarea></div>
                <button onclick="submitShipment()" style="width:100%;padding:15px;background:#e60012;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">✅ إضافة الشحنة</button>
                <p id="shipError" style="color:red;margin-top:10px;"></p>
            `;
        }

        async function submitShipment() {
            const receiverName = document.getElementById('f_receiverName').value.trim();
            const receiverPhone = document.getElementById('f_receiverPhone').value.trim();
            const receiverPhone2 = document.getElementById('f_receiverPhone2').value.trim();
            const governorate = document.getElementById('f_governorate').value;
            const city = document.getElementById('f_city').value;
            const address = document.getElementById('f_address').value.trim();
            const amount = document.getElementById('f_amount').value.trim();
            const weight = document.getElementById('f_weight').value.trim() || '1';
            const notes = document.getElementById('f_notes').value.trim();
            const errorDiv = document.getElementById('shipError');

            if (!receiverName || !receiverPhone || !governorate || !city || !address || !amount) {
                errorDiv.textContent = "يرجى ملء جميع الحقول المطلوبة (*)";
                return;
            }

            const params = new URLSearchParams();
            params.append('action', 'addShipment');
            params.append('phone', currentUser.phone);
            params.append('password', currentUser.password);
            params.append('receiverName', receiverName);
            params.append('receiverPhone', receiverPhone);
            params.append('receiverPhone2', receiverPhone2);
            params.append('governorate', governorate);
            params.append('city', city);
            params.append('address', address);
            params.append('amount', amount);
            params.append('weight', weight);
            params.append('notes', notes);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await res.json();
                if (data.success) { 
                    closeModal(); 
                    loadMyShipments(); 
                    showToast('✅ تم إضافة الشحنة بنجاح!', 'success');
                } else { 
                    errorDiv.textContent = data.msg || "فشل الإضافة"; 
                }
            } catch (e) { 
                errorDiv.textContent = 'فشل الاتصال'; 
            }
        }

        // ============================================================
        //  🔢 إضافة رقم تتبع (للأدمن) - تحديث العمود A
        // ============================================================
        function showAddTracking(shipmentId) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = `
                <span class="close-btn" onclick="closeModal()">✖</span>
                <h3>🔢 إضافة رقم تتبع</h3>
                <p>رقم الشحنة: <strong>${shipmentId}</strong></p>
                <div class="form-group"><label>🚚 رقم التتبع</label><input id="trackingNum" dir="ltr" placeholder="مثال: JEG000470355620"></div>
                <button onclick="submitTracking('${shipmentId}')" style="width:100%;padding:15px;background:#28a745;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">💾 حفظ</button>
                <p id="trackError" style="color:red;margin-top:10px;"></p>
            `;
        }

        async function submitTracking(shipmentId) {
            const trackingNumber = document.getElementById('trackingNum').value.trim();
            const errorDiv = document.getElementById('trackError');
            if (!trackingNumber) { errorDiv.textContent = 'يرجى إدخال رقم التتبع'; return; }
            
            const params = new URLSearchParams();
            params.append('action', 'addTrackingNumber');
            params.append('adminPhone', currentUser.phone);
            params.append('adminPassword', currentUser.password);
            params.append('shipmentId', shipmentId);
            params.append('trackingNumber', trackingNumber);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await res.json();
                if (data.success) { 
                    closeModal(); 
                    loadAllShipments(); 
                    showToast('✅ تم إضافة رقم التتبع!', 'success');
                } else { 
                    errorDiv.textContent = data.msg; 
                }
            } catch (e) { 
                errorDiv.textContent = 'فشل الاتصال'; 
            }
        }

        // ============================================================
        //  🗑️ حذف شحنة (للأدمن)
        // ============================================================
        async function deleteShipment(shipmentId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الشحنة؟')) return;
            
            const params = new URLSearchParams();
            params.append('action', 'deleteShipment');
            params.append('adminPhone', currentUser.phone);
            params.append('adminPassword', currentUser.password);
            params.append('shipmentId', shipmentId);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await res.json();
                if (data.success) { 
                    loadAllShipments(); 
                    showToast('✅ تم حذف الشحنة بنجاح', 'success');
                } else { 
                    showToast(data.msg || '❌ فشل الحذف', 'error');
                }
            } catch (e) { 
                showToast('⚠️ فشل الاتصال بالخادم', 'error');
            }
        }

        // ============================================================
        //  🚚 تتبع الشحنة
        // ============================================================
        async function trackShipment(billCode) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = '<div class="loading"><div class="spinner"></div>جاري تتبع الشحنة...</div>';
            
            try {
                const res = await fetch(`${API_URL}?action=track&billCode=${billCode}`);
                const data = await res.json();
                console.log('📡 Track response:', data);

                if (data.code === "1" && data.data && data.data[0]) {
                    let html = `<span class="close-btn" onclick="closeModal()">✖</span><h3>🚚 مسار الشحنة: ${billCode}</h3>`;
                    const details = data.data[0].details || [];
                    if (details.length === 0) {
                        html += `<p style="text-align:center;color:#999;padding:20px;">لا توجد تفاصيل تتبع متاحة</p>`;
                    } else {
                        details.forEach(d => {
                            html += `<div class="timeline-item">
                                <div class="time">🕐 ${d.scanTime || ''}</div>
                                <div class="event">📌 ${d.desc || d.scanType || ''}</div>
                                <div class="location">📍 ${d.scanNetworkName || ''} ${d.scanNetworkCity ? '- ' + d.scanNetworkCity : ''}</div>
                                ${d.probleDescription ? `<div style="color:red;margin-top:5px;">⚠️ ${d.probleDescription}</div>` : ''}
                            </div>`;
                        });
                    }
                    document.getElementById('modalContent').innerHTML = html;
                } else {
                    let errorMsg = data.msg || data.error || 'فشل تتبع الشحنة';
                    document.getElementById('modalContent').innerHTML = `
                        <span class="close-btn" onclick="closeModal()">✖</span>
                        <div style="text-align:center;padding:20px;color:#dc3545;">
                            <div style="font-size:48px;margin-bottom:12px;">❌</div>
                            <p>${errorMsg}</p>
                            <p style="font-size:13px;color:#999;">رقم التتبع: ${billCode}</p>
                            <div class="debug-box">${JSON.stringify(data, null, 2)}</div>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('modalContent').innerHTML = `
                    <span class="close-btn" onclick="closeModal()">✖</span>
                    <div style="text-align:center;padding:20px;color:#dc3545;">
                        <div style="font-size:48px;margin-bottom:12px;">📡</div>
                        <p>فشل الاتصال بخدمة التتبع</p>
                        <p style="font-size:13px;color:#999;">${e.message}</p>
                    </div>
                `;
            }
        }

        // ============================================================
        //  👥 إدارة العملاء (للأدمن)
        // ============================================================
        async function showClients() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
            
            try {
                const params = new URLSearchParams();
                params.append('action', 'allClients');
                params.append('adminPhone', currentUser.phone);
                params.append('adminPassword', currentUser.password);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await res.json();
                
                if (data.success) {
                    let html = `<span class="close-btn" onclick="closeModal()">✖</span><h3>👥 إدارة العملاء</h3>
                        <button onclick="showAddClientForm()" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:8px;margin-bottom:15px;cursor:pointer;font-size:16px;">➕ إنشاء حساب عميل جديد</button>
                        <div id="clientList"></div>`;
                    document.getElementById('modalContent').innerHTML = html;
                    
                    const listDiv = document.getElementById('clientList');
                    if (data.clients.length === 0) {
                        listDiv.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">لا يوجد عملاء حتى الآن</p>';
                    } else {
                        data.clients.forEach(c => {
                            listDiv.innerHTML += `<div class="client-card">
                                <div class="client-info"><strong>${c.name}</strong><br>📱 ${c.phone}<br><small>📅 ${c.created}</small></div>
                                <div class="client-actions"><button onclick="deleteClient('${c.phone}')">🗑️ حذف</button></div>
                            </div>`;
                        });
                    }
                } else {
                    document.getElementById('modalContent').innerHTML = `<span class="close-btn" onclick="closeModal()">✖</span><p style="color:red;">${data.msg || 'فشل التحميل'}</p>`;
                }
            } catch (e) {
                document.getElementById('modalContent').innerHTML = `<span class="close-btn" onclick="closeModal()">✖</span><p style="color:red;">فشل الاتصال</p>`;
            }
        }

        function showAddClientForm() {
            document.getElementById('modalContent').innerHTML = `
                <span class="close-btn" onclick="showClients()">✖</span>
                <h3>➕ إنشاء حساب عميل جديد</h3>
                <div class="form-group"><label>👤 اسم العميل</label><input id="newClientName" placeholder="الاسم الكامل"></div>
                <div class="form-group"><label>📱 رقم الهاتف</label><input id="newClientPhone" dir="ltr" placeholder="مثال: 011xxxxxxxx"></div>
                <div class="form-group"><label>🔒 كلمة المرور</label><input id="newClientPassword" type="password" dir="ltr" placeholder="كلمة المرور للدخول"></div>
                <button onclick="createClient()" style="width:100%;padding:15px;background:#28a745;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">✅ إنشاء الحساب</button>
                <button onclick="showClients()" style="width:100%;padding:10px;background:#999;color:white;border:none;border-radius:8px;margin-top:10px;cursor:pointer;">↩️ رجوع</button>
                <p id="clientError" style="color:red;margin-top:10px;text-align:center;"></p>
            `;
        }

        async function createClient() {
            const name = document.getElementById('newClientName').value.trim();
            const phone = document.getElementById('newClientPhone').value.trim();
            const password = document.getElementById('newClientPassword').value.trim();
            const errorDiv = document.getElementById('clientError');
            if (!name || !phone || !password) { errorDiv.textContent = "يرجى ملء جميع الحقول"; return; }
            
            const params = new URLSearchParams();
            params.append('action', 'createClient');
            params.append('adminPhone', currentUser.phone);
            params.append('adminPassword', currentUser.password);
            params.append('clientName', name);
            params.append('clientPhone', phone);
            params.append('clientPassword', password);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await res.json();
                if (data.success) { showClients(); showToast('✅ تم إنشاء الحساب!', 'success'); }
                else { errorDiv.textContent = data.msg; }
            } catch (e) { errorDiv.textContent = 'فشل الاتصال'; }
        }

        async function deleteClient(phone) {
            if (!confirm('هل أنت متأكد من حذف هذا العميل؟')) return;
            try {
                const params = new URLSearchParams();
                params.append('action', 'deleteClient');
                params.append('phone', phone);
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                showClients();
                showToast('✅ تم حذف العميل', 'success');
            } catch (e) { 
                showToast('⚠️ فشل الحذف', 'error');
            }
        }

        // ============================================================
        //  🖥️ دوال مساعدة
        // ============================================================
        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
        }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) { 
            if (e.key === 'Enter') doLogin(); 
        });
        document.getElementById('phoneInput').addEventListener('keypress', function(e) { 
            if (e.key === 'Enter') document.getElementById('passwordInput').focus(); 
        });
    </script>
